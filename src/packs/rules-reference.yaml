              <tr><td>1</td><td><strong>Precise</strong></td><td>Exact intended result — no collateral</td></tr>
              <tr><td>1</td><td><strong>Aid</strong></td><td>Ally gains +1 die on next related roll this scene</td></tr>
              <tr><td>2</td><td><strong>Extended Effect</strong></td><td>Outcome lasts an additional scene or 1+ hours</td></tr>
              <tr><td>2</td><td><strong>Additional Target</strong></td><td>Results apply to one additional target in zone</td></tr>
            </tbody>
          </table>

