    # ══════════════════════════════════════════════════
    # CHAPTER 13: ADVANCEMENT
    # ══════════════════════════════════════════════════
    - name: 'Chapter 13: Advancement'
      type: text
      text:
        content: |
          <h2>Experience Points (XP)</h2>
          <p>XP is tracked as <strong>three values</strong> on your character sheet:</p>
          <ul>
            <li><strong>Total XP</strong> — all XP ever earned. Only increases.</li>
            <li><strong>XP Spent</strong> — cumulative cost of skill increases and talent purchases.</li>
            <li><strong>Current XP</strong> — available to spend. Calculated as Total − Spent.</li>
          </ul>
          <p>Awarded at the end of each <strong>session</strong> through a Debriefing. Maximum <strong>5 XP per session</strong>.</p>

          <h3>Debriefing Questions</h3>
          <table>
            <thead><tr><th>#</th><th>Question</th></tr></thead>
            <tbody>
              <tr><td>1</td><td>Did you participate in the session? <em>(Automatic +1 XP — this is always yes.)</em></td></tr>
              <tr><td>2</td><td>Did you risk your life for a fellow Covenant member or an innocent civilian?</td></tr>
              <tr><td>3</td><td>Did you interact heavily with your Anchor, or did a personal connection complicate the mission?</td></tr>
              <tr><td>4</td><td>Did the team successfully secure or contain an Occult Artifact?</td></tr>
              <tr><td>5</td><td>Did you learn something new and significant about the supernatural threat or rival factions?</td></tr>
            </tbody>
          </table>

          <h3>Spending XP</h3>
          <table>
            <thead><tr><th>Upgrade</th><th>Cost</th><th>Limit</th></tr></thead>
            <tbody>
              <tr><td>Increase a Skill by 1</td><td>5 XP</td><td>Maximum rating of 5</td></tr>
              <tr><td>Purchase a new Talent (at-will or per-session)</td><td>6 XP</td><td>General, Division, or Wing/Paradigm/Department Talent</td></tr>
              <tr><td>Purchase a new Talent (per-case-file)</td><td>10 XP</td><td>High-impact talents restricted to once per Case File</td></tr>
            </tbody>
          </table>

          <h2>Dark Secrets</h2>
          <p>A specific fact from your character's past — something true, hidden, and consequential. Serves as a roleplay device (DA hook) and XP trigger.</p>

          <h3>Faction Consequences</h3>
          <ul>
            <li><strong>Exposed to team:</strong> No mechanical consequence. Team decides response.</li>
            <li><strong>Exposed to Covenant:</strong> Cell loses −1 Standing. If actively aiding rival faction: −3 Standing + CL reduced by 1 for one Case File.</li>
            <li><strong>Exposed to rival faction:</strong> Faction gains leverage. DA may present a task from the faction once per arc.</li>
          </ul>

          <h3>Wayfinder Dark Secret Examples</h3>
          <ul>
            <li><strong>The Fabricated Report</strong> — You submitted false field analysis burying evidence of a civilian casualty.</li>
            <li><strong>The Missing Informant</strong> — Your cultivated informant disappeared. You didn't report them missing.</li>
            <li><strong>Unauthorized Correspondence</strong> — You've been communicating with a researcher through channels that shouldn't exist.</li>
            <li><strong>The Siphoned Archive</strong> — You copied a restricted Codex section and hid the transcription.</li>
            <li><strong>The Wrong Conclusion</strong> — Your analysis caused the team to release a contained artifact.</li>
          </ul>

          <h3>Recovery Dark Secret Examples</h3>
          <ul>
            <li><strong>The One You Left</strong> — You left someone behind who could have survived with ten more minutes.</li>
            <li><strong>The Side Deal</strong> — You traded Covenant assets for artifact cooperation.</li>
            <li><strong>The Competing Employer</strong> — A pre-Covenant intelligence firm still thinks you're theirs.</li>
            <li><strong>The Planted Evidence</strong> — You framed an innocent to close a civilian case.</li>
            <li><strong>The Kept Artifact</strong> — You have a secondary artifact in a box in your apartment.</li>
          </ul>

          <h3>Keep Dark Secret Examples</h3>
          <ul>
            <li><strong>The Unauthorized Transfer</strong> — You moved an artifact without clearance; three junior staff were affected.</li>
            <li><strong>The Suppressed Incident</strong> — A civilian consultant witnessed a brief containment failure you suppressed.</li>
            <li><strong>The Loyalty Debt</strong> — You owe someone in the Vantablack Compact.</li>
            <li><strong>The Copyist</strong> — You maintain an unauthorized personal archive of containment protocols.</li>
            <li><strong>The Broken Warden</strong> — A trainee you supervised is institutionalized under a false name.</li>
          </ul>

          <h3>Stack Dark Secret Examples</h3>
          <ul>
            <li><strong>The Off-Books Supply Chain</strong> — Unauthorized procurement network with questionable suppliers.</li>
            <li><strong>The Substitution</strong> — You substituted mission-critical equipment and falsified the manifest.</li>
            <li><strong>The Blackmail File</strong> — You photographed a compromising document about a senior Covenant official.</li>
            <li><strong>The Freelance Job</strong> — Contract work using Covenant resources, possibly overlapping with service.</li>
            <li><strong>The Faulty Log</strong> — Inventory inconsistency that may implicate you.</li>
          </ul>

    # ══════════════════════════════════════════════════
    # CHAPTER 15: CASE FILES
    # ══════════════════════════════════════════════════
    - name: 'Chapter 14: Case Files'
      type: text
      text:
        content: |
          <h2>Case File Structure</h2>
          <p>A case runs over <strong>14 days</strong>, each with 4 shifts (Morning, Day, Evening, Night) = <strong>56 shifts</strong> total.</p>

          <h3>Running a Shift (6 Steps)</h3>
          <ol>
            <li><strong>Set the Scene</strong> — describe what changed since last shift.</li>
            <li><strong>Choose Undertaking</strong> — Scene, Travel, Surveillance, Research, Preparation, or Recovery.</li>
            <li><strong>Send a Packet</strong> (optional) — 1 Covenant Request Packet per shift.</li>
            <li><strong>Resolve the Undertaking</strong> — play out the scene.</li>
            <li><strong>Advance the Board</strong> — fill shift quadrant, advance organization rows, check milestones.</li>
            <li><strong>Note Delayed Returns</strong> — record what will come back and when.</li>
          </ol>

          <h2>The Operations Board</h2>
          <p>A grid with 14 columns (days 14→1). Column 14 = case start. Column 1 = catastrophe.</p>

          <h3>Shift Row</h3>
          <p>Top row. Each day divided into 4 quadrants. Fill as shifts pass. <strong>Relic milestones</strong> trigger when a milestone day is completed.</p>

          <h2>Travel</h2>
          <table>
            <thead><tr><th>Distance</th><th>Cost</th></tr></thead>
            <tbody>
              <tr><td>Local reposition</td><td>Part of existing shift</td></tr>
              <tr><td>Cross-city</td><td>1 shift</td></tr>
              <tr><td>Regional drive</td><td>1–2 shifts</td></tr>
              <tr><td>Overnight road</td><td>2–3 shifts</td></tr>
              <tr><td>Cross-country / international</td><td>Multiple shifts + logistics</td></tr>
            </tbody>
          </table>

          <h2>Surveillance</h2>
          <h3>Noticing a Tail</h3>
          <ul>
            <li><strong>Passive:</strong> Investigate (WIT) Diff 2</li>
            <li><strong>Actively looking:</strong> Investigate (WIT) Diff 1</li>
            <li>Professional tail: +1 Difficulty</li>
          </ul>
          <h3>Losing a Tail</h3>
          <table>
            <thead><tr><th>Option</th><th>Skill</th><th>Diff</th><th>Result</th></tr></thead>
            <tbody>
              <tr><td>Outrun</td><td>Tech (WIT)</td><td>2</td><td>Tail loses visual.</td></tr>
              <tr><td>Blend In</td><td>Sneak (AGI)</td><td>2</td><td>Lost in traffic.</td></tr>
              <tr><td>Double Back</td><td>Investigate (WIT)</td><td>3</td><td>Tail lost + identity revealed.</td></tr>
            </tbody>
          </table>

          <h2>Road Event Table (d12)</h2>
          <table>
            <thead><tr><th>Roll</th><th>Event</th></tr></thead>
            <tbody>
              <tr><td>1</td><td>Weather Turn — vehicle rolls −1 die.</td></tr>
              <tr><td>2</td><td>Breakdown — 1 Wear, Tech Diff 2.</td></tr>
              <tr><td>3</td><td>Police Checkpoint.</td></tr>
              <tr><td>4</td><td>Road Accident.</td></tr>
              <tr><td>5</td><td>Tail Detected.</td></tr>
              <tr><td>6</td><td>Corruption Event — all +1 Corruption.</td></tr>
              <tr><td>7</td><td>CB Radio Intercept.</td></tr>
              <tr><td>8</td><td>Trucker's Information.</td></tr>
              <tr><td>9</td><td>Wrong Turn — +1 leg.</td></tr>
              <tr><td>10</td><td>Mechanical Oddity.</td></tr>
              <tr><td>11</td><td>Fuel Stop.</td></tr>
              <tr><td>12</td><td>Clean Run — arrive ahead.</td></tr>
            </tbody>
          </table>
