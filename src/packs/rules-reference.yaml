    - name: Initiative
      type: text
      text:
        content: >
          <h2>Initiative</h2>

          <p>Each participant draws an <strong>Initiative Card</strong> from a standard deck (Ace–10). Higher value acts
          first. Aces are low (value 1). Ties: draw replacements until broken. Reshuffle each round.</p>

          <h3>Surprise &amp; Ambush</h3>

          <ul>
            <li>Ambush attempt: <strong>Sneak (AGI)</strong> opposed by target's <strong>Investigate (WIT)</strong>.</li>
            <li>If ambush succeeds: free full round of actions before initiative cards are drawn. Targets cannot Dodge or Parry.</li>
            <li>If ambush fails: draw initiative normally.</li>
          </ul>
    - name: Actions
      type: text
      text:
        content: >
          <h2>Action Economy</h2>

          <p>Each turn: <strong>1 Slow Action</strong> + <strong>1 Fast Action</strong> + any Free Actions.</p>

          <h3>Slow Actions</h3>

          <table>
            <thead><tr><th>Action</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td><strong>Attack</strong></td><td>Roll to hit and deal damage</td></tr>
              <tr><td><strong>First Aid</strong></td><td>Heal skill to restore STR or treat Critical Injury</td></tr>
              <tr><td><strong>Reload</strong></td><td>Reload dry firearm (no roll)</td></tr>
              <tr><td><strong>Use Artifact</strong></td><td>Activate artifact properties</td></tr>
              <tr><td><strong>Help Ally</strong></td><td>+1 die to ally's next roll</td></tr>
              <tr><td><strong>Manipulate NPC</strong></td><td>Talk down, negotiate during combat</td></tr>
            </tbody>
          </table>

          <h3>Fast Actions</h3>

          <table>
            <thead><tr><th>Action</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td><strong>Move 1 zone</strong></td><td>Move to adjacent zone</td></tr>
              <tr><td><strong>Draw/holster weapon</strong></td><td>Ready or stow a weapon</td></tr>
              <tr><td><strong>Take cover</strong></td><td>+2 AR bonus in current zone</td></tr>
              <tr><td><strong>Stand up</strong></td><td>Rise from prone</td></tr>
              <tr><td><strong>Dodge</strong></td><td>Reactive — add AGI dice to defense</td></tr>
            </tbody>
          </table>

          <p><strong>Movement:</strong> 1 zone = 1 Fast Action. 2 zones = Fast + Slow (whole turn). Max 2
          zones/turn.</p>
    - name: Attacks & Defense
      type: text
      text:
        content: |
          <h2>Melee Combat</h2>
          <ul>
            <li><strong>Heavy melee</strong> (knife, crowbar): Force (STR) + Weapon Gear Bonus</li>
            <li><strong>Fast melee</strong> (unarmed, quick knife): Brawl (STR) + Weapon Gear Bonus</li>
            <li>Unarmed: base 1 Damage</li>
          </ul>
          <h3>Special Maneuvers</h3>
          <table>
            <thead><tr><th>Maneuver</th><th>Skill</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td><strong>Grapple</strong></td><td>Brawl vs Force/Brawl</td><td>Target cannot move, use 2H weapons, or take Slow Actions</td></tr>
              <tr><td><strong>Shove</strong></td><td>Force vs Endure</td><td>Pushed back 1 zone and knocked prone</td></tr>
              <tr><td><strong>Disarm</strong></td><td>Sleight of Hand vs Force/Brawl</td><td>Target drops weapon</td></tr>
              <tr><td><strong>Feint</strong></td><td>Brawl vs Wits</td><td>Target can't Dodge/Parry next attack; +2 dice</td></tr>
            </tbody>
          </table>
          <h2>Ranged Combat</h2>
          <p>Roll <strong>Firearms (AGI)</strong> + Weapon Gear Bonus. Range penalties apply per weapon type.</p>
          <h3>Range Penalties</h3>
          <table>
            <thead><tr><th>Weapon</th><th>Engaged</th><th>Near</th><th>Short</th><th>Long</th><th>Distant</th></tr></thead>
            <tbody>
              <tr><td>Pistol</td><td>−1</td><td>—</td><td>—</td><td>−1</td><td>Out</td></tr>
              <tr><td>Shotgun</td><td>+1 Dmg</td><td>—</td><td>—</td><td>−2</td><td>Out</td></tr>
              <tr><td>Rifle</td><td>−2</td><td>−1</td><td>—</td><td>—</td><td>−1</td></tr>
            </tbody>
          </table>
          <h3>Reactive Actions</h3>
          <ul>
            <li><strong>Dodge</strong> (Fast Action): Add AGI dice vs attacker. Ties favor defender. Costs next Fast Action.</li>
            <li><strong>Parry</strong> (Slow Action): Roll Brawl/Force vs attacker (melee only). Match or exceed = no damage. Costs next Slow Action.</li>
          </ul>
    - name: Damage & Armor
      type: text
      text:
        content: >
          <h2>Damage</h2>

          <p>On hit, deal the weapon's flat <strong>Damage</strong> value to the target's Strength. Armor intercepts
          first.</p>

          <h2>Armor</h2>

          <p>Roll d6s equal to <strong>Armor Rating (AR)</strong>. Each 6 absorbs 1 damage.</p>

          <h3>Cover</h3>

          <ul>
            <li><strong>Soft cover</strong> (car door, desk): +2 AR vs ranged</li>
            <li><strong>Hard cover</strong> (concrete, engine block): +4 AR vs ranged</li>
            <li>Firing from cover loses the bonus until next turn</li>
          </ul>

          <h3>Ammunition (Resource Die)</h3>

          <p>Roll the ammo die after every turn fired. On <strong>1–2</strong>: step down (d10→d8→d6→d4→empty). At
          empty: weapon is dry — reload costs a Slow Action.</p>

          <p><strong>Full Auto:</strong> Two separate attack rolls (same or split targets). Roll ammo die twice. −1 die
          on Firearms until next turn.</p>
    - name: Combat Stunts
      type: text
      text:
        content: |
          <h2>Combat Stunts</h2>
          <table>
            <thead><tr><th>Cost</th><th>Stunt</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>1</td><td><strong>Knock Prone</strong></td><td>Target must spend Fast Action to stand</td></tr>
              <tr><td>1</td><td><strong>Disarm</strong></td><td>Target drops weapon at Engaged range</td></tr>
              <tr><td>1</td><td><strong>Target Limb</strong></td><td>Situational penalty until treated</td></tr>
              <tr><td>1</td><td><strong>Push Back</strong></td><td>Target forced one zone away</td></tr>
              <tr><td>1</td><td><strong>Scare</strong></td><td>Target makes Fear Check (FR 1)</td></tr>
              <tr><td>2</td><td><strong>Double Damage</strong></td><td>Deal weapon damage twice</td></tr>
              <tr><td>2</td><td><strong>Suppressive Fire</strong></td><td>Target pinned — can't move without WIT roll (Diff 2)</td></tr>
              <tr><td>2</td><td><strong>Destroy Cover</strong></td><td>Target's cover destroyed</td></tr>
              <tr><td>3</td><td><strong>Critical Hit</strong></td><td>Roll on Critical Injury table</td></tr>
            </tbody>
          </table>
    - name: Zone Movement & Features
      type: text
      text:
        content: |
          <h2>Zone Features</h2>
          <table>
            <thead><tr><th>Feature</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td><strong>Cramped</strong></td><td>Long weapons −2 dice. Movement in/out costs Slow Action.</td></tr>
              <tr><td><strong>Rough</strong></td><td>Entering requires AGI roll (Diff 1) or fall prone.</td></tr>
              <tr><td><strong>Dark</strong></td><td>Investigate/Firearms/ranged lose half dice. Sneak gains +2.</td></tr>
              <tr><td><strong>Open</strong></td><td>No cover. Ranged attacks gain +1 die.</td></tr>
              <tr><td><strong>Elevated</strong></td><td>+2 initiative value. Ranged attacks against suffer −1 die.</td></tr>
            </tbody>
          </table>
          <h3>Chase Rules</h3>
          <p>Track distance on a 5-step track: <strong>Contact → Following → Closing → Widening → Escaped</strong>.</p>
          <ul>
            <li>Compare successes each round. Winner moves track 1 step in their favor.</li>
            <li>Fled party escapes at Escaped position.</li>
            <li>Attacks during chase at −1 die.</li>
            <li>At Widening: Sneak (Diff 2) to break chase entirely (once per chase).</li>
          </ul>
    - name: Disposition
      type: text
      text:
        content: >
          <h2>NPC Disposition</h2>

          <p>Every non-cooperative NPC has a <strong>Disposition</strong> on a 5-point track:</p>

          <table>
            <thead><tr><th>Score</th><th>State</th><th>Behavior</th></tr></thead>
            <tbody>
              <tr><td>5</td><td><strong>Open</strong></td><td>Wants to help. No roll needed.</td></tr>
              <tr><td>4</td><td><strong>Cautious</strong></td><td>Willing to talk but hedges on sensitive topics.</td></tr>
              <tr><td>3</td><td><strong>Guarded</strong></td><td>Resistant. Sensitive rolls at Difficulty 2.</td></tr>
              <tr><td>2</td><td><strong>Hostile</strong></td><td>Uncooperative. May lie/deflect. Rolls at Difficulty 3.</td></tr>
              <tr><td>1</td><td><strong>Closed</strong></td><td>Won't engage. Must raise to 2 before rolls possible.</td></tr>
            </tbody>
          </table>

          <h3>Shifting Disposition</h3>

          <p><strong>Up (+1):</strong> Successful Psychoanalyze (calm/reassure), successful Manipulate, showing good
          faith, presenting evidence, performing a service.</p>

          <p><strong>Down (−1):</strong> Failed Manipulate, detected deception, threats at Disposition 3+, revealing
          dangerous information.</p>

          <p>At <strong>Disposition 1</strong>, social rolls are impossible. Non-roll actions (evidence, concessions,
          removing threats) must restore to 2 first.</p>
    - name: Social Rolls
      type: text
      text:
        content: >
          <h2>Social Rolls</h2>

          <h3>Manipulate (EMP)</h3>

          <ul>
            <li><strong>Success:</strong> NPC complies. Disposition +1.</li>
            <li><strong>Failure:</strong> Denied. Disposition −1.</li>
            <li><strong>Pushed failure:</strong> Disposition −2, +1 Corruption.</li>
          </ul>

          <h3>Command (EMP)</h3>

          <ul>
            <li>Does not work at Disposition 1. At Disposition 2: emergency directives only (Diff 2).</li>
            <li><strong>Success:</strong> NPC complies. No Disposition shift.</li>
            <li><strong>Failure:</strong> No Disposition shift.</li>
          </ul>

          <h3>Psychoanalyze (EMP)</h3>

          <p><strong>Reading:</strong> DA reveals one truth about NPC's state. Grants +1 die and −1 Difficulty on next
          social roll vs same NPC (same scene).</p>

          <p><strong>Stabilizing:</strong> Success = Disposition +2 (max 4). Failure = Disposition −1.</p>
    - name: NPC Reactions & Consequences
      type: text
      text:
        content: >
          <h2>NPC Social Defense</h2>

          <p>Canny NPCs may roll opposed <strong>Psychoanalyze</strong> to actively read agents, or use <strong>lie
          detection</strong> (Empathy + Psychoanalyze vs agent's Manipulate).</p>

          <h2>Failed Social Scene Consequences</h2>

          <table>
            <thead><tr><th>Consequence</th><th>Example</th></tr></thead>
            <tbody>
              <tr><td><strong>Closed source</strong></td><td>NPC won't speak again this mission</td></tr>
              <tr><td><strong>Alert raised</strong></td><td>NPC warns employer or faction</td></tr>
              <tr><td><strong>Physical escalation</strong></td><td>Scene tips into violence</td></tr>
              <tr><td><strong>Faction response</strong></td><td>Rival faction begins accelerating</td></tr>
              <tr><td><strong>Trust erosion</strong></td><td>Standing loss within the Covenant</td></tr>
            </tbody>
          </table>
    - name: Damage Types
      type: text
      text:
        content: >
          <h2>Damage Types</h2>

          <table>
            <thead><tr><th>Type</th><th>Target</th><th>Sources</th></tr></thead>
            <tbody>
              <tr><td><strong>Physical</strong></td><td>Strength / Agility</td><td>Weapons, hazards, combat</td></tr>
              <tr><td><strong>Mental</strong></td><td>Wits / Empathy</td><td>Failed Fear checks, psychic attacks, social betrayal</td></tr>
              <tr><td><strong>Corruption</strong></td><td>Corruption track</td><td>Pushing, artifacts, occult exposure</td></tr>
            </tbody>
          </table>

          <p>Physical defaults to STR (AGI for exhaustion). Mental defaults to WIT (EMP for emotional). The source
          specifies the target — the defender does not choose.</p>
    - name: Conditions & Broken
      type: text
      text:
        content: |
          <h2>The Broken State</h2>
          <p>When any attribute reaches <strong>0</strong>:</p>
          <ul>
            <li>Character is immediately <strong>incapacitated</strong> — cannot take actions or move.</li>
            <li>Can speak briefly (a few words per round).</li>
            <li>Must roll on a <strong>Critical Injury table</strong>.</li>
            <li>An ally may drag them (1 zone per Slow Action).</li>
          </ul>
          <h3>Death States</h3>
          <table>
            <thead><tr><th>State</th><th>Meaning</th></tr></thead>
            <tbody>
              <tr><td><strong>Broken</strong></td><td>Any attribute = 0. Critical Injury rolled. Can still be saved.</td></tr>
              <tr><td><strong>Dying</strong></td><td>Broken with a † Critical Injury. Stabilization window closing.</td></tr>
              <tr><td><strong>Dead</strong></td><td>Death Check failed, or instant-death result, or window expired.</td></tr>
            </tbody>
          </table>
    - name: Critical Injuries
      type: text
      text:
        content: >
          <h2>Critical Injuries</h2>

          <p>Roll <strong>D66</strong> (two d6: first = tens, second = units) on the appropriate table when Broken.</p>

          <ul>
            <li><strong>Physical (STR/AGI = 0):</strong> Physical Critical Injury table</li>
            <li><strong>Mental (WIT/EMP = 0):</strong> Mental &amp; Emotional Critical Injury table</li>
          </ul>

          <h3>Death Check</h3>

          <p>Results marked <strong>†</strong> require a Death Check: roll 1d6.</p>

          <ul>
            <li><strong>1–2:</strong> Character dies.</li>
            <li><strong>3–6:</strong> Survives — injury still applies.</li>
          </ul>

          <p><strong>Medical Training talent:</strong> Ally Heal (WIT) Diff 2 → patient rolls d6+1 instead (death only
          on natural 1).</p>

          <h3>Insights</h3>

          <p>Some injuries grant permanent <strong>Insights</strong> — mechanical bonuses (e.g., +1 die on Command
          forever). Cannot be removed even if injury is treated.</p>

          <h3>Mental Criticals</h3>

          <p>All mental critical injuries gain <strong>+1 Corruption</strong> upon rolling the table. Many require
          <strong>Psychoanalyze campaigns</strong> (multiple downtime phases of treatment) to recover.</p>
    - name: Attribute Recovery
      type: text
      text:
        content: >
          <h2>Attribute Recovery</h2>

          <table>
            <thead><tr><th>Method</th><th>Restored</th><th>Conditions</th></tr></thead>
            <tbody>
              <tr><td><strong>Short Rest (1 Shift)</strong></td><td>1 point each damaged attribute</td><td>Safe location, ~4 hours</td></tr>
              <tr><td><strong>Full Downtime</strong></td><td>All damage cleared</td><td>Between Case Files</td></tr>
              <tr><td><strong>Medical Aid (Heal check)</strong></td><td>+1 per success beyond Diff</td><td>First Aid Kit required</td></tr>
              <tr><td><strong>Infirmary (HQ)</strong></td><td>3 points per Shift</td><td>Keep's Infirmary facility</td></tr>
            </tbody>
          </table>

          <p><strong>Broken Recovery:</strong> Attribute at 0 requires Heal (WIT) Diff 2 + First Aid Kit + full Shift of
          rest. Restores attribute to 1.</p>
    - name: Corruption Sources
      type: text
      text:
        content: >
          <h2>The Corruption Track</h2>

          <p>Starts at <strong>0</strong>. Maximum Threshold = <strong>10 + Empathy</strong>. Exceeding threshold =
          permanent catatonia (character retirement).</p>

          <h2>Sources of Corruption</h2>

          <table>
            <thead><tr><th>Trigger</th><th>Corruption</th></tr></thead>
            <tbody>
              <tr><td>Pushing a Roll</td><td>+1</td></tr>
              <tr><td>Division Talent activation</td><td>+1 (or free)</td></tr>
              <tr><td>Occult Exposure</td><td>+1 to +3</td></tr>
              <tr><td>Artifact Activation</td><td>+1 to +3 (by tier)</td></tr>
              <tr><td>Fear Check (any 1s rolled)</td><td>+1</td></tr>
              <tr><td>Failed Fear Check</td><td>+1 (additional)</td></tr>
              <tr><td>Successful Psychoanalyze on contaminated NPC</td><td>+1</td></tr>
            </tbody>
          </table>
    - name: Corruption Effects
      type: text
      text:
        content: |
          <h2>Corruption Effects</h2>
          <table>
            <thead><tr><th>Corruption</th><th>Stage</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>1–3</td><td>Nosebleeds / Migraines</td><td>Intense pressure. Character maintains control.</td></tr>
              <tr><td>4–6</td><td>Auditory Hallucinations</td><td>Whispers from the void. WIT roll (Diff 1) once/session to distinguish real from imagined.</td></tr>
              <tr><td>7–9</td><td>Eldritch Tremors</td><td>−1 die Sleight of Hand &amp; Firearms. Visible twitches.</td></tr>
              <tr><td>10–12</td><td>Reality Distortion</td><td>Environment warps. Electronic gear degrades. Allies in zone gain +1 Corruption/scene.</td></tr>
              <tr><td>13–14</td><td>Fugue States</td><td>DA rolls d6 per scene: 1–2 = DA controls character 1 round.</td></tr>
              <tr><td>Exceeds</td><td>Catatonic Revelation</td><td>Mind breaks permanently. Removed from campaign.</td></tr>
            </tbody>
          </table>
    - name: Fear Checks
      type: text
      text:
        content: >
          <h2>Fear Check Procedure</h2>

          <p>A special binary roll — does <strong>not</strong> use Difficulty. Cannot be pushed. Cannot receive helping
          dice.</p>

          <ol>
            <li>Roll dice equal to current <strong>Wits</strong> (no skill modifier).</li>
            <li>One or more 6s = <strong>success</strong>.</li>
            <li>Any 1s (even on success) = <strong>+1 Corruption</strong>.</li>
            <li>No 6s = <strong>failure</strong>: 1 Mental (WIT) damage + +1 Corruption + roll Panic Table.</li>
          </ol>

          <h3>Panic Table (d6)</h3>

          <table>
            <thead><tr><th>Roll</th><th>Response</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>1</td><td><strong>Fight</strong></td><td>Attack nearest creature (bare hands, single strike)</td></tr>
              <tr><td>2</td><td><strong>Flight</strong></td><td>Run max speed 1d6 rounds, drop items</td></tr>
              <tr><td>3</td><td><strong>Freeze</strong></td><td>Paralyzed. Psychoanalyze (Diff 1) to snap out.</td></tr>
              <tr><td>4</td><td><strong>Denial</strong></td><td>Treat supernatural as mundane. Psychoanalyze (Diff 2) breaks it.</td></tr>
              <tr><td>5</td><td><strong>Compulsion</strong></td><td>Repetitive behavior. Psychoanalyze (Diff 2) frees.</td></tr>
              <tr><td>6</td><td><strong>Fugue</strong></td><td>DA controls character rest of scene. Psychoanalyze (Diff 3) recovers.</td></tr>
            </tbody>
          </table>

          <h3>Fear Ratings</h3>

          <table>
            <thead><tr><th>Rating</th><th>Level</th><th>Examples</th></tr></thead>
            <tbody>
              <tr><td>1</td><td>Unsettling</td><td>Wrong shadows, impossible sounds</td></tr>
              <tr><td>2</td><td>Disturbing</td><td>Possessed civilian, minor entity</td></tr>
              <tr><td>3</td><td>Horrifying</td><td>Fully manifest mid-tier entity</td></tr>
              <tr><td>4</td><td>Shattering</td><td>Major named entity, impossible acts</td></tr>
              <tr><td>5</td><td>Annihilating</td><td>Class-5 entity, tear in space</td></tr>
            </tbody>
          </table>
    - name: Healing & Recovery
      type: text
      text:
        content: >
          <h2>Healing Corruption</h2>

          <table>
            <thead><tr><th>Method</th><th>Effect</th><th>Requirements</th></tr></thead>
            <tbody>
              <tr><td><strong>Anchor Scene</strong></td><td>Heal 1d4 Corruption</td><td>Once/session. Hold Anchor in a safe, quiet moment.</td></tr>
              <tr><td><strong>Safe Scene</strong></td><td>Heal 1 Corruption</td><td>Once/session. Quiet, safe scene (different from Anchor).</td></tr>
              <tr><td><strong>Full Rest (24h)</strong></td><td>Heal = Empathy score</td><td>Secure, non-anomalous location. Between Case Files only.</td></tr>
              <tr><td><strong>Healing Talents</strong></td><td>Varies</td><td>Per talent description</td></tr>
            </tbody>
          </table>

          <p><strong>Session Healing Cap:</strong> Max <strong>5 Corruption</strong> per session from active in-session
          sources (Anchor + Safe Scene + Talents). Full Rest is not subject to this cap.</p>
    - name: Step-by-Step Process
      type: text
      text:
        content: |
          <h2>Character Creation — 11 Steps</h2>
          <ol>
            <li><strong>Choose Division</strong> — Wayfinder, Recovery, or The Keep</li>
            <li><strong>Choose Department/Background</strong> — Wing, Paradigm, or Department</li>
            <li><strong>Choose Age Group &amp; Attributes</strong> — Distribute Attribute Points (min 2, max 5 each)</li>
            <li><strong>Distribute Skill Points</strong> — Max 3 per skill (Key Skill: max 4)</li>
            <li><strong>Choose 3 Starting Talents</strong> — Division/General + Sub-unit + Background</li>
            <li><strong>Record Starting Statistics</strong> — CL, Corruption 0, Threshold</li>
            <li><strong>Claim Division Item</strong> — Codex / Satchel / Bracer</li>
            <li><strong>Select Starting Gear</strong> — Division kit</li>
            <li><strong>Choose Anchor</strong> — Object + memory (roll d66 or custom)</li>
            <li><strong>Choose Dark Secret</strong> — From Division list or custom</li>
            <li><strong>Name, Origin &amp; Biography</strong></li>
          </ol>
    - name: Age Groups & Attributes
      type: text
      text:
        content: |
          <h2>Age Groups</h2>
          <table>
            <thead><tr><th>Group</th><th>Age</th><th>Attr Pts</th><th>Skill Pts</th><th>CL Mod</th></tr></thead>
            <tbody>
              <tr><td><strong>Young</strong></td><td>22–28</td><td>14</td><td>10</td><td>−1</td></tr>
              <tr><td><strong>Experienced</strong></td><td>29–38</td><td>13</td><td>12</td><td>+0</td></tr>
              <tr><td><strong>Senior</strong></td><td>39–52</td><td>12</td><td>14</td><td>+1</td></tr>
            </tbody>
          </table>
          <h2>Division Key Skills</h2>
          <table>
            <thead><tr><th>Division</th><th>Key Skill (Cap 4)</th><th>Base CL</th></tr></thead>
            <tbody>
              <tr><td>Wayfinder</td><td>Lore</td><td>3</td></tr>
              <tr><td>Recovery</td><td>Firearms</td><td>2</td></tr>
              <tr><td>The Keep</td><td>Command</td><td>3</td></tr>
            </tbody>
          </table>
          <h2>Starting Statistics</h2>
          <ul>
            <li><strong>Clearance Level:</strong> Division base + Age Group modifier (min 1)</li>
            <li><strong>Corruption:</strong> 0</li>
            <li><strong>Max Corruption Threshold:</strong> 10 + Empathy</li>
          </ul>
    - name: Talents & Gear
      type: text
      text:
        content: |
          <h2>Starting Talents (3 slots)</h2>
          <table>
            <thead><tr><th>Slot</th><th>Choose From</th></tr></thead>
            <tbody>
              <tr><td><strong>Division or General</strong></td><td>Division talent list OR one General Talent</td></tr>
              <tr><td><strong>Sub-unit</strong></td><td>Wing / Paradigm / Department talent list</td></tr>
              <tr><td><strong>Background</strong></td><td>Background Talents (always passive, no cost)</td></tr>
            </tbody>
          </table>
          <h2>Division Items</h2>
          <table>
            <thead><tr><th>Division</th><th>Item</th><th>Key Ability</th></tr></thead>
            <tbody>
              <tr><td>Wayfinder</td><td><strong>Verdant Codex</strong></td><td>+1 die on Lore/Investigate; preserves knowledge</td></tr>
              <tr><td>Recovery</td><td><strong>Verdant Satchel</strong></td><td>Suppresses artifact aura; warns of instability</td></tr>
              <tr><td>The Keep</td><td><strong>Warden's Bracer</strong></td><td>+1 AR; absorbs 1 Corruption/session</td></tr>
            </tbody>
          </table>
    - name: Anchor & Dark Secret
      type: text
      text:
        content: >
          <h2>Anchor</h2>

          <p>A tangible, physical object tied to a core memory from before the Covenant. Once per session, interact with
          it to heal <strong>1d4 Corruption</strong>. Roll d66 on the Anchor Table or create your own.</p>

          <h2>Dark Secret</h2>

          <p>Something specific from your past — an event, decision, or relationship. Must be specific enough that the
          DA can use it as a story hook. XP question: "Did your Dark Secret complicate the mission?" = +1 XP.</p>
    - name: Gear Bonus & Weapons
      type: text
      text:
        content: |
          <h2>1980s Weaponry</h2>
          <table>
            <thead><tr><th>Weapon</th><th>Gear</th><th>Dmg</th><th>Range</th><th>CL</th></tr></thead>
            <tbody>
              <tr><td>Brass Knuckles</td><td>+1</td><td>1</td><td>Engaged</td><td>1</td></tr>
              <tr><td>Switchblade</td><td>+1</td><td>2</td><td>Engaged</td><td>1</td></tr>
              <tr><td>Stun Gun</td><td>+2</td><td>—</td><td>Engaged</td><td>2</td></tr>
              <tr><td>.38 Revolver</td><td>+2</td><td>2</td><td>Short</td><td>2</td></tr>
              <tr><td>9mm Pistol</td><td>+2</td><td>2</td><td>Short</td><td>3</td></tr>
              <tr><td>Pump Shotgun</td><td>+3</td><td>3</td><td>Short</td><td>3</td></tr>
              <tr><td>M16 Rifle</td><td>+2</td><td>3</td><td>Long</td><td>4</td></tr>
            </tbody>
          </table>
          <h2>Armor</h2>
          <table>
            <thead><tr><th>Armor</th><th>AR</th><th>Enc</th><th>CL</th></tr></thead>
            <tbody>
              <tr><td>Concealed Kevlar Vest</td><td>3</td><td>1</td><td>3</td></tr>
              <tr><td>Tactical Riot Armor</td><td>6</td><td>3</td><td>4</td></tr>
            </tbody>
          </table>
          <h2>Investigative &amp; Paranormal Tech</h2>
          <table>
            <thead><tr><th>Item</th><th>Gear &amp; Effect</th><th>CL</th></tr></thead>
            <tbody>
              <tr><td>Heavy-Duty Maglite</td><td>+1 Investigate in dark; blunt weapon (Dmg 1)</td><td>1</td></tr>
              <tr><td>Polaroid SX-70</td><td>+2 Lore at crime scenes</td><td>2</td></tr>
              <tr><td>Spirit Box Prototype</td><td>+2 Lore (entity motives)</td><td>3</td></tr>
              <tr><td>Thermal Camera</td><td>+2 Investigate (heat, cold spots)</td><td>4</td></tr>
            </tbody>
          </table>
    - name: Resource Die
      type: text
      text:
        content: >
          <h2>Resource Dice</h2>

          <p>Consumable supplies are tracked with a step-down die (d12→d10→d8→d6→d4→Depleted).</p>

          <p>Roll after each scene of meaningful use. On <strong>1–2</strong>: step down one size. At d4, rolling 1–2 =
          <strong>depleted</strong>.</p>

          <table>
            <thead><tr><th>Die</th><th>Level</th></tr></thead>
            <tbody>
              <tr><td>d12</td><td>Fully stocked</td></tr>
              <tr><td>d10</td><td>Well supplied</td></tr>
              <tr><td>d8</td><td>Adequate</td></tr>
              <tr><td>d6</td><td>Running low</td></tr>
              <tr><td>d4</td><td>Critical — final uses</td></tr>
            </tbody>
          </table>
    - name: Encumbrance
      type: text
      text:
        content: |
          <h2>Encumbrance</h2>
          <p><strong>Carry Capacity:</strong> Strength × 2 Enc. points.</p>
          <ul>
            <li><strong>Encumbered</strong> (exceeds capacity): −1 die on STR/AGI rolls. Moving costs Slow Action.</li>
            <li><strong>Overloaded</strong> (exceeds STR × 3): Cannot move at all. Must drop gear.</li>
          </ul>
          <h3>Clearance Levels</h3>
          <table>
            <thead><tr><th>CL</th><th>Access</th></tr></thead>
            <tbody>
              <tr><td>1</td><td>All agents — basic supplies</td></tr>
              <tr><td>2</td><td>Default Recovery CL</td></tr>
              <tr><td>3</td><td>Default Wayfinder/Keep CL</td></tr>
              <tr><td>4</td><td>Senior agents — restricted hardware</td></tr>
              <tr><td>5</td><td>Maximum — prototype equipment</td></tr>
            </tbody>
          </table>
    - name: Crafting & Repair
      type: text
      text:
        content: >
          <h2>Repair Rules</h2>

          <p>Repairing gear requires time, parts, and a <strong>Tech (WIT)</strong> roll.</p>

          <table>
            <thead><tr><th>Condition</th><th>Diff</th><th>Time</th></tr></thead>
            <tbody>
              <tr><td>Degraded (below max)</td><td>1</td><td>15 min (1 scene)</td></tr>
              <tr><td>Broken (non-electronic)</td><td>2</td><td>1 Shift (~4h)</td></tr>
              <tr><td>Broken (electronic)</td><td>3</td><td>1 Shift + Power Tools</td></tr>
              <tr><td>Artifact-adjacent damage</td><td>4</td><td>Occult Lab or Wayfinder</td></tr>
            </tbody>
          </table>

          <p>Each success restores Gear Bonus by 1 (up to max). Repairs consume a <strong>Junk Die</strong> (d6 Resource
          Die for parts).</p>
    - name: Artifact Die & Activation
      type: text
      text:
        content: >
          <h2>The Artifact Die</h2>

          <p>A usage die tracking stability: <strong>d20 → d12 → d10 → d8 → d6 → d4 → Fractured</strong>.</p>

          <p>On a roll of <strong>1</strong>, the die steps down one level. Past d4 = <strong>Fracture</strong>
          (catastrophic failure).</p>

          <h2>Activation Procedure</h2>

          <ol>
            <li><strong>Meet activation condition</strong> (spoken phrase, physical action, etc.)</li>
            <li><strong>Declare activation</strong> — costs a Slow Action</li>
            <li><strong>Pay Corruption cost</strong> — +1/+2/+3 by tier (always paid)</li>
            <li><strong>Effect resolves</strong> — automatic, no additional roll</li>
            <li><strong>Roll Artifact Die</strong> — on 1: step down (or Fracture at d4)</li>
          </ol>

          <p>The effect <strong>always fires</strong>, even when the die fractures.</p>
    - name: Corruption Tiers
      type: text
      text:
        content: |
          <h2>Corruption Budget</h2>
          <table>
            <thead><tr><th>Tier</th><th>Cost</th><th>Power Level</th></tr></thead>
            <tbody>
              <tr><td><strong>1 — Uncanny</strong></td><td>1 Corruption</td><td>Auto-success on single roll, or reveal Diff 2 info</td></tr>
              <tr><td><strong>2 — Threatening</strong></td><td>2 Corruption</td><td>Replace full roll with guaranteed success, or significant combat advantage</td></tr>
              <tr><td><strong>3 — Catastrophic</strong></td><td>3 Corruption</td><td>Transcends human action — reality alteration, mass psychic attack</td></tr>
            </tbody>
          </table>
          <h3>Risk Tags</h3>
          <table>
            <thead><tr><th>Tag</th><th>Meaning</th></tr></thead>
            <tbody>
              <tr><td><strong>Stable</strong></td><td>Behavior mostly understood; local blast radius</td></tr>
              <tr><td><strong>Volatile</strong></td><td>Partly understood; side effects escalate quickly</td></tr>
              <tr><td><strong>Catastrophic</strong></td><td>Can alter entire scene/case trajectory</td></tr>
              <tr><td><strong>Unknown</strong></td><td>Not yet understood; treat as last resort</td></tr>
            </tbody>
          </table>
    - name: Emission & Containment
      type: text
      text:
        content: |
          <h2>Corruption Emission</h2>
          <table>
            <thead><tr><th>Type</th><th>Radius</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td><strong>Aura</strong></td><td>Same zone</td><td>+1 Corruption at scene start</td></tr>
              <tr><td><strong>Pulse</strong></td><td>Adjacent zones</td><td>+1 Corruption on triggered event</td></tr>
              <tr><td><strong>Burst</strong></td><td>Up to 4 zones</td><td>+2 Corruption to all in range</td></tr>
            </tbody>
          </table>
          <h2>Containment Rituals</h2>
          <p>Lore-led procedures. Led by any agent with <strong>Lore 1+</strong> (Banishment requires Lore 3+).</p>
          <table>
            <thead><tr><th>Ritual</th><th>Diff</th><th>Time</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td><strong>Quiescence</strong></td><td>2</td><td>10 min</td><td>Suppress activation/emission for 1 scene</td></tr>
              <tr><td><strong>Shielding</strong></td><td>2</td><td>Full scene</td><td>Seal vs passive broadcast until end of shift</td></tr>
              <tr><td><strong>Banishment</strong></td><td>3</td><td>Full scene</td><td>Disperse manifestation or collapse ritual site</td></tr>
            </tbody>
          </table>
    - name: Truths & Fracture
      type: text
      text:
        content: >
          <h2>Containment-First Principle</h2>

          <p>Artifact activation is <strong>not</strong> the default objective. Many missions are won by preventing
          activation, isolating carriers, or transferring to secure containment.</p>

          <h2>Artifact Carry Weight</h2>

          <ul>
            <li><strong>Tier 1:</strong> 1 Enc.</li>
            <li><strong>Tier 2:</strong> 2 Enc.</li>
            <li><strong>Tier 3:</strong> 3 Enc.</li>
            <li>Activated artifacts: +1 Enc. for remainder of Case File.</li>
            <li>If Encumbered by artifact: +1 Corruption per scene.</li>
            <li><strong>3+ artifacts carried:</strong> Corruption Cascade — all leak Corruption at end of scene.</li>
          </ul>

          <h2>Fracture</h2>

          <p>When the Artifact Die steps past d4, the artifact fractures. The Fracture Condition (defined per artifact)
          triggers immediately, thematically linked to its origin.</p>
    - name: Standing & Threat
      type: text
      text:
        content: >
          <h2>Covenant Standing</h2>

          <p>Per-cell score from <strong>0–20</strong> measuring institutional trust.</p>

          <table>
            <thead><tr><th>Score</th><th>Rank</th><th>Key Benefit</th></tr></thead>
            <tbody>
              <tr><td>0–4</td><td>Unknown</td><td>Minimal resources; Tier 1 upgrades only</td></tr>
              <tr><td>5–9</td><td>Acknowledged</td><td>+1 Lore die from Covenant; Tier 2 unlocked</td></tr>
              <tr><td>10–14</td><td>Trusted</td><td>+2 Lore dice; Keep reinforcements; Tier 3 unlocked</td></tr>
              <tr><td>15–19</td><td>Honored</td><td>+3 Lore dice; unrestricted access</td></tr>
              <tr><td>20</td><td>Elite</td><td>No resource limits; legacy recorded</td></tr>
            </tbody>
          </table>

          <h2>Threat Meter</h2>

          <p>Hidden DA track (0–6). At 6: Compromise Event. Increases from explosives use, escaped agents, containment
          leaks, law enforcement links.</p>
    - name: Development Points & Upgrades
      type: text
      text:
        content: |
          <h2>Earning Development Points</h2>
          <table>
            <thead><tr><th>Trigger</th><th>DP</th></tr></thead>
            <tbody>
              <tr><td>Case File fully resolved</td><td>3</td></tr>
              <tr><td>Artifact contained &amp; logged</td><td>1</td></tr>
              <tr><td>Named Threat neutralized</td><td>1</td></tr>
              <tr><td>Primary objective under pressure</td><td>1</td></tr>
              <tr><td>Agent rescued</td><td>1</td></tr>
            </tbody>
          </table>
          <h2>HQ Upgrade Tree</h2>
          <h3>Tier 1 (No prerequisites)</h3>
          <ul>
            <li><strong>Secure Comms Room</strong> (2 DP) — +1 Command die for contacts; free contact call/downtime</li>
            <li><strong>Basic Medical Bay</strong> (2 DP) — +2 Attribute recovery/downtime; clear non-lethal criticals</li>
            <li><strong>Safeguard Protocol</strong> (1 DP) — +1 initiative die if HQ attacked</li>
          </ul>
          <h3>Tier 2 (Requires 1 Tier 1 + Standing 5)</h3>
          <ul>
            <li><strong>Microfiche Archive</strong> (3 DP) — +2 Gear bonus Lore research</li>
            <li><strong>Occult Laboratory</strong> (3 DP) — Identify artifacts at Diff 1 safely</li>
            <li><strong>Black-Market Armory</strong> (3 DP) — All agents equip at CL 4</li>
            <li><strong>Faraday Cage</strong> (4 DP) — Heal up to 4 Corruption/downtime</li>
          </ul>
          <h3>Tier 3 (Requires 2 Tier 2 + Standing 10+)</h3>
          <ul>
            <li><strong>Field Intelligence Network</strong> (5 DP) — Free clue per Case File</li>
            <li><strong>Covenant Armorer</strong> (5 DP) — Permanently upgrade 1 item/Case File</li>
            <li><strong>Corruption Dampening Vault</strong> (6 DP) — Store 3 artifacts safely</li>
            <li><strong>Safe House Network</strong> (6 DP) — Fallback safe house anywhere</li>
          </ul>
    - name: Personnel
      type: text
      text:
        content: |
          <h2>Personnel Recruitment</h2>
          <table>
            <thead><tr><th>Personnel</th><th>DP</th><th>Benefit</th></tr></thead>
            <tbody>
              <tr><td><strong>Station Dispatcher</strong></td><td>2</td><td>Police records, scanner intercepts, or 10-min non-response window (1/Case File)</td></tr>
              <tr><td><strong>Field Medic</strong></td><td>2</td><td>Treat non-lethal Critical Injury (Heal Diff 2)</td></tr>
              <tr><td><strong>Black-Market Fence</strong></td><td>3</td><td>1× CL 4 item without CL burn (48h delay)</td></tr>
              <tr><td><strong>Covenant Scholar</strong></td><td>3</td><td>+1 Lore die; translates dead languages overnight</td></tr>
              <tr><td><strong>Signals Technician</strong></td><td>4</td><td>Plant audio tap (1/Case File); +1 Tech die at HQ</td></tr>
            </tbody>
          </table>
    - name: Wayfinder
      type: text
      text:
        content: |
          <h2>Division 1: Wayfinder</h2>
          <p><em>"What is found must be known."</em></p>
          <p>Primary investigative arm. Scholars, hackers, and researchers uncovering artifact locations.</p>
          <ul>
            <li><strong>Key Attributes:</strong> Wits, Empathy</li>
            <li><strong>Key Skill (Cap 4):</strong> Lore</li>
            <li><strong>Starting CL:</strong> 3</li>
            <li><strong>Division Item:</strong> Verdant Codex (+1 Lore/Investigate die; preserves knowledge)</li>
            <li><strong>Wings:</strong> Research, Counterintelligence</li>
          </ul>
          <h3>Wayfinder Talents</h3>
          <table>
            <thead><tr><th>Talent</th><th>Cost</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>The Antiquarian's Eye</td><td>+1</td><td>Identify artifact trigger or effect without Lore roll</td></tr>
              <tr><td>Ghost in the Machine</td><td>+1</td><td>Interface with anomalous electronics via Tech</td></tr>
              <tr><td>The Hunch</td><td>+1</td><td>Ask DA one yes/no question (truthful answer)</td></tr>
              <tr><td>Academic Grounding <em>(Healing)</em></td><td>—</td><td>Research entity for 1 hour; heal 1 Corruption</td></tr>
              <tr><td>Eldritch Empathy</td><td>+1</td><td>Sense entity's emotional state or intent</td></tr>
            </tbody>
          </table>
    - name: Recovery
      type: text
      text:
        content: |
          <h2>Division 2: Recovery</h2>
          <p><em>"What is known must be contained."</em></p>
          <p>Field retrieval arm. Go in and bring the artifact out.</p>
          <ul>
            <li><strong>Key Attributes:</strong> Strength, Agility</li>
            <li><strong>Key Skill (Cap 4):</strong> Firearms</li>
            <li><strong>Starting CL:</strong> 2</li>
            <li><strong>Division Item:</strong> Verdant Satchel (suppresses aura; warns of instability)</li>
            <li><strong>Paradigms:</strong> Ex-Agency Operative, Heavy-Hitter, Acquisition Specialist</li>
          </ul>
          <h3>Recovery Talents</h3>
          <table>
            <thead><tr><th>Talent</th><th>Cost</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>Conditioned Mind</td><td>—</td><td>1/session: push without Corruption cost (declare before push)</td></tr>
              <tr><td>Unstoppable Force</td><td>+1</td><td>Next melee attack +2 damage</td></tr>
              <tr><td>Shadow Walker</td><td>+1</td><td>Imperceptible to mundane detection for a scene</td></tr>
              <tr><td>Adrenaline Junkie</td><td>—</td><td>When STR damaged: +2 dice on AGI rolls</td></tr>
              <tr><td>Gallows Humor <em>(Healing)</em></td><td>—</td><td>After combat: you + hearing allies heal 1d4 Corruption</td></tr>
              <tr><td>Combat Reflexes</td><td>—</td><td>Draw 2 initiative cards, keep 1</td></tr>
            </tbody>
          </table>
    - name: The Keep
      type: text
      text:
        content: >
          <h2>Division 3: The Keep</h2>

          <p><em>"What is contained must be guarded."</em></p>

          <p>Custodial authority. Handling, documentation, containment, and protection of artifacts.</p>

          <ul>
            <li><strong>Key Attributes:</strong> Empathy, Wits</li>
            <li><strong>Key Skill (Cap 4):</strong> Command</li>
            <li><strong>Starting CL:</strong> 3</li>
            <li><strong>Division Item:</strong> Warden's Bracer (+1 AR; absorbs 1 Corruption/session)</li>
            <li><strong>Departments:</strong> Catalogers, Wardens, Internal CI, Stack (Logistics)</li>
          </ul>

          <h3>Stack (Logistics)</h3>

          <p>Technicians, quartermasters, engineers, and inventors maintaining Covenant gear stores. Gain +1 requisition
          die for crafting materials.</p>
    - name: Division Items
      type: text
      text:
        content: |
          <h2>Division Items Summary</h2>
          <table>
            <thead><tr><th>Division</th><th>Item</th><th>Functions</th></tr></thead>
            <tbody>
              <tr><td>Wayfinder</td><td><strong>Verdant Codex</strong></td><td>+1 Lore/Investigate die (1/scene); preserves written knowledge; faintly glows near ancient magic; contains living map of artifact correlations</td></tr>
              <tr><td>Recovery</td><td><strong>Verdant Satchel</strong></td><td>Suppresses artifact aura (no passive Corruption); warns of instability; delays activation 1 round (1/scene); contains basic field tools</td></tr>
              <tr><td>The Keep</td><td><strong>Warden's Bracer</strong></td><td>+1 Armor Rating; absorbs 1 Corruption/session (automatic); dampens emissions during handling; warns of containment failure</td></tr>
            </tbody>
          </table>
    - name: Travel Rules
      type: text
      text:
        content: >
          <h2>Travel as a Shift Type</h2>

          <p>Travel shifts count against the Operations Board. Every shift in transit is a shift organizations keep
          advancing.</p>

          <table>
            <thead><tr><th>Distance</th><th>Cost</th></tr></thead>
            <tbody>
              <tr><td>Local reposition</td><td>Part of existing shift (unless contested)</td></tr>
              <tr><td>Cross-city</td><td>1 shift</td></tr>
              <tr><td>Regional drive</td><td>1–2 shifts</td></tr>
              <tr><td>Overnight road</td><td>2–3 shifts</td></tr>
              <tr><td>Cross-country / international</td><td>Multiple shifts + logistics</td></tr>
            </tbody>
          </table>

          <h3>Resolving a Travel Shift</h3>

          <p>Only roll when the route is contested:</p>

          <ul>
            <li><strong>Vehicle:</strong> Investigate (WIT) — Diff 1 clear, 2 at night/weather, 3 under pursuit</li>
            <li><strong>Foot/urban:</strong> Sneak (AGI) — Diff 1 normal, 2 hostile areas</li>
            <li><strong>Charter flight:</strong> Tech (WIT) — Diff 2</li>
          </ul>
    - name: Surveillance & Pursuit
      type: text
      text:
        content: >
          <h2>Being Followed</h2>

          <h3>Noticing a Tail</h3>

          <ul>
            <li><strong>Passive:</strong> Investigate (WIT) Diff 2</li>
            <li><strong>Actively looking:</strong> Investigate (WIT) Diff 1</li>
            <li>Professional tail: +1 Difficulty</li>
          </ul>

          <h3>Losing a Tail</h3>

          <table>
            <thead><tr><th>Option</th><th>Skill</th><th>Diff</th><th>Result</th></tr></thead>
            <tbody>
              <tr><td><strong>Outrun</strong></td><td>Tech (WIT)</td><td>2</td><td>Tail loses visual</td></tr>
              <tr><td><strong>Blend In</strong></td><td>Sneak (AGI)</td><td>2</td><td>Lost in traffic</td></tr>
              <tr><td><strong>Double Back</strong></td><td>Investigate (WIT)</td><td>3</td><td>Tail lost + identity revealed</td></tr>
            </tbody>
          </table>

          <p>If the tail arrives at the destination: additional hostile element in arrival scene; one Organization
          advances on the Board.</p>

          <h2>Road Event Table (d12)</h2>

          <table>
            <thead><tr><th>Roll</th><th>Event</th></tr></thead>
            <tbody>
              <tr><td>1</td><td>Weather Turn — vehicle rolls −1 die</td></tr>
              <tr><td>2</td><td>Breakdown — 1 Wear, Tech Diff 2</td></tr>
              <tr><td>3</td><td>Police Checkpoint</td></tr>
              <tr><td>4</td><td>Road Accident</td></tr>
              <tr><td>5</td><td>Tail Detected</td></tr>
              <tr><td>6</td><td>Corruption Event — all gain +1 Corruption</td></tr>
              <tr><td>7</td><td>CB Radio Intercept</td></tr>
              <tr><td>8</td><td>Trucker's Information</td></tr>
              <tr><td>9</td><td>Wrong Turn — +1 leg</td></tr>
              <tr><td>10</td><td>Mechanical Oddity</td></tr>
              <tr><td>11</td><td>Fuel Stop</td></tr>
              <tr><td>12</td><td>Clean Run — arrive ahead</td></tr>
            </tbody>
          </table>
    - name: Shifts & Structure
      type: text
      text:
        content: >
          <h2>Case File Structure</h2>

          <p>A case runs over <strong>14 days</strong>, each with 4 shifts (Morning, Day, Evening, Night) = <strong>56
          shifts</strong> total.</p>

          <h3>Running a Shift (6 Steps)</h3>

          <ol>
            <li><strong>Set the Scene</strong> — describe what changed since last shift</li>
            <li><strong>Choose Undertaking</strong> — Scene, Travel, Surveillance, Research, Preparation, or Recovery</li>
            <li><strong>Send a Packet</strong> (optional) — 1 Covenant Request Packet per shift</li>
            <li><strong>Resolve the Undertaking</strong> — play out the scene</li>
            <li><strong>Advance the Board</strong> — fill shift quadrant, advance organization rows, check milestones</li>
            <li><strong>Note Delayed Returns</strong> — record what will come back and when</li>
          </ol>
    - name: Operations Board
      type: text
      text:
        content: >
          <h2>The Operations Board</h2>

          <p>A grid with 14 columns (days 14→1). Column 14 = case start. Column 1 = catastrophe.</p>

          <h3>Shift Row</h3>

          <p>Top row. Each day divided into 4 quadrants. Fill quadrants as shifts pass. <strong>Relic
          milestones</strong> trigger when a milestone day is completed.</p>

          <h3>Organization Rows</h3>

          <p>External pressure sources with their own countdown tracks. Each row has 14 squares; when a milestone square
          is reached, its event fires.</p>

          <p>Organizations escalate based on: agent activity, visible anomalies, publicity, faction paranoia, missed
          opportunities, and cross-links from other organization milestones.</p>
    - name: Locations & NPCs
      type: text
      text:
        content: >
          <h2>Case Entities</h2>

          <h3>Locations</h3>

          <p>Each Location form tracks: Name, Description, Availability
          (open/clue-locked/contact-locked/time-locked/packet-locked), NPCs Present, Information Available (I# codes),
          Organizations Present, Positive/Negative Results, Milestone Changes.</p>

          <h3>NPC Cards</h3>

          <p>Playing-card-sized references: Name, Organization (O#), Secret, Goal, Artifact Connection, Starting
          Knowledge (I# refs), Gained Knowledge (milestone-driven), Positive/Negative Results.</p>

          <h3>Information Cards</h3>

          <p>Discoverable facts identified by I# codes. Each lists: Location sources, NPC sources, HQ fallback timing,
          and type (Containment Truth or intel).</p>
    - name: Packets & Scene Resolution
      type: text
      text:
        content: |
          <h2>Covenant Request Packets</h2>
          <ul>
            <li>1 packet per shift</li>
            <li>Minimum response: <strong>2 shifts</strong>. Sensitive requests: 3+ shifts.</li>
            <li>Must be specific — not "tell us everything"</li>
          </ul>
          <h2>Scene Resolution</h2>
          <p>When a shift becomes an active scene:</p>
          <ol>
            <li>State the objective</li>
            <li>DA names the Key Activity (primary skill test)</li>
            <li>Other players declare contributions (Immediate, Shield, Position, Delayed)</li>
            <li>Roll and resolve</li>
          </ol>
          <h3>Result Bands</h3>
          <table>
            <thead><tr><th>Band</th><th>Outcome</th></tr></thead>
            <tbody>
              <tr><td><strong>Clean Progress</strong></td><td>Objective achieved without complications</td></tr>
              <tr><td><strong>Progress With Cost</strong></td><td>Achieved, but something goes wrong</td></tr>
              <tr><td><strong>Partial Progress</strong></td><td>Some achieved, key piece missing</td></tr>
              <tr><td><strong>Setback With Signal</strong></td><td>Failed, but agents learn something</td></tr>
              <tr><td><strong>Breach</strong></td><td>Loud, public, or unstable — organization advances</td></tr>
            </tbody>
          </table>
    - name: Experience Points
      type: text
      text:
        content: |
          <h2>XP &amp; Debrief</h2>
          <p>XP awarded at end of each session via <strong>5 Debrief Questions</strong> (max 5 XP/session):</p>
          <ol>
            <li>Did you participate? (automatic +1 XP)</li>
            <li>Did you risk your life for a Covenant member or civilian?</li>
            <li>Did your Dark Secret complicate the mission, or did you interact with your Anchor?</li>
            <li>Did the team secure or contain an Artifact?</li>
            <li>Did you learn something new about the supernatural threat or rival factions?</li>
          </ol>
          <h2>Spending XP</h2>
          <table>
            <thead><tr><th>Upgrade</th><th>Cost</th><th>Limit</th></tr></thead>
            <tbody>
              <tr><td>Increase Skill by 1</td><td>5 XP</td><td>Max rating 5</td></tr>
              <tr><td>New Talent</td><td>6 XP</td><td>General, Division, or Sub-unit</td></tr>
            </tbody>
          </table>
    - name: Clearance Level Progression
      type: text
      text:
        content: |
          <h2>Clearance Level Advancement</h2>
          <p>CL is no longer purchased directly with XP. To increase personal CL:</p>
          <ul>
            <li>Purchase <strong>Requisition Authority</strong> general talent (6 XP, repeatable) — raises personal CL by 1 (max 5)</li>
            <li>Team <strong>Standing</strong> grants a cell-wide equipping cap (CL 3 at Standing 5; CL 4 at Standing 10)</li>
            <li>Use whichever is higher during Equipping Phase</li>
          </ul>
    - name: Game Terms
      type: text
      text:
        content: |
          <h2>Glossary of Game Terms</h2>
          <table>
            <thead><tr><th>Term</th><th>Definition</th></tr></thead>
            <tbody>
              <tr><td><strong>Aftermath</strong></td><td>Wrap-up phase after a Case File. Earn DP, spend on HQ upgrades.</td></tr>
              <tr><td><strong>Anchor</strong></td><td>Physical object linked to a memory. Interact to heal 1d4 Corruption (1/session).</td></tr>
              <tr><td><strong>Arc</strong></td><td>Sequence of 3–5 Case Files with shared antagonist or artifact thread.</td></tr>
              <tr><td><strong>Armor Rating (AR)</strong></td><td>Gear dice rolled to absorb damage. Each 6 = 1 damage cancelled.</td></tr>
              <tr><td><strong>Artifact Die</strong></td><td>Step-down usage die: d20→d12→d10→d8→d6→d4→Fractured.</td></tr>
              <tr><td><strong>Broken</strong></td><td>Any attribute = 0. Incapacitated. Roll Critical Injury.</td></tr>
              <tr><td><strong>Case File</strong></td><td>Structured operation on an Operations Board with shifts and organizations.</td></tr>
              <tr><td><strong>Clearance Level (CL)</strong></td><td>Equipment authorization tier (1–5). Division base + Age modifier.</td></tr>
              <tr><td><strong>Containment Truth</strong></td><td>Statement about artifact behavior: Trigger, Appetite, Quiescence Condition.</td></tr>
              <tr><td><strong>Corruption</strong></td><td>Cumulative psychic damage. Threshold = 10 + Empathy. Exceeding = catatonia.</td></tr>
              <tr><td><strong>Critical Injury</strong></td><td>D66 wound/trauma rolled when Broken. Some marked † = Death Check.</td></tr>
              <tr><td><strong>D66</strong></td><td>Two d6 read as two-digit number (first = tens, second = units).</td></tr>
              <tr><td><strong>Dark Secret</strong></td><td>Hidden past fact. XP hook: "Did it complicate the mission?" = +1 XP.</td></tr>
              <tr><td><strong>Death Check</strong></td><td>1d6: 1–2 = dead. 3–6 = survive. Medical Training gives d6+1.</td></tr>
              <tr><td><strong>Development Points (DP)</strong></td><td>Shared resource for HQ upgrades. Earned during Aftermath.</td></tr>
              <tr><td><strong>Difficulty</strong></td><td>Number of 6s needed to succeed. Default 1.</td></tr>
              <tr><td><strong>Director of Agents (DA)</strong></td><td>The game master / facilitator.</td></tr>
              <tr><td><strong>Disposition</strong></td><td>NPC openness (1–5). Drives social roll Difficulty.</td></tr>
              <tr><td><strong>Division</strong></td><td>Character class: Wayfinder, Recovery, or The Keep.</td></tr>
              <tr><td><strong>Division Item</strong></td><td>Codex (Wayfinder), Satchel (Recovery), Bracer (Keep).</td></tr>
              <tr><td><strong>Dying</strong></td><td>Broken with † Critical Injury. Untreated = death.</td></tr>
              <tr><td><strong>Fear Check</strong></td><td>Wits-only binary roll. 6s = pass. 1s = +1 Corruption. No 6s = fail + Panic.</td></tr>
              <tr><td><strong>Fear Rating</strong></td><td>Entity terror level (1–5). Determines when DA calls Fear Checks.</td></tr>
              <tr><td><strong>Fracture</strong></td><td>Artifact Die past d4. Catastrophic failure of artifact.</td></tr>
              <tr><td><strong>Gear Dice</strong></td><td>Black dice from equipment. 1s cause degradation.</td></tr>
              <tr><td><strong>Group Roll</strong></td><td>All team rolls same skill. Pass threshold: all/majority/one.</td></tr>
              <tr><td><strong>Information Card</strong></td><td>Discoverable fact in a Case File (I# code).</td></tr>
              <tr><td><strong>Initiative Card</strong></td><td>Playing card (Ace–10) for combat order. Higher = first.</td></tr>
              <tr><td><strong>Insight</strong></td><td>Permanent bonus from Critical Injury. Cannot be removed.</td></tr>
              <tr><td><strong>Location</strong></td><td>Place in a Case File with NPCs, info, and organization ties.</td></tr>
              <tr><td><strong>NPC Card</strong></td><td>Reference card: name, org, secret, goal, knowledge.</td></tr>
              <tr><td><strong>Operations Board</strong></td><td>Case File tracking surface. 14 columns, shift row + org rows.</td></tr>
              <tr><td><strong>Opposed Roll</strong></td><td>Both sides roll; higher total wins. Ties favor PC.</td></tr>
              <tr><td><strong>Organization</strong></td><td>External pressure on Operations Board (O# code).</td></tr>
              <tr><td><strong>Panic Table</strong></td><td>d6 on Fear failure: Fight/Flight/Freeze/Denial/Compulsion/Fugue.</td></tr>
              <tr><td><strong>Push</strong></td><td>Re-roll non-6 dice. Costs +1 Corruption. Once per roll.</td></tr>
              <tr><td><strong>Relic Milestone</strong></td><td>Day-keyed artifact event on Operations Board shift row.</td></tr>
              <tr><td><strong>Resource Die</strong></td><td>Step-down die for consumables (d12→d4→depleted). 1–2 = step down.</td></tr>
              <tr><td><strong>Shift</strong></td><td>6-hour block: Morning, Day, Evening, Night. Core time unit.</td></tr>
              <tr><td><strong>Standing</strong></td><td>Cell reputation (0–20). Gates HQ upgrades and CL access.</td></tr>
              <tr><td><strong>Stunt Points</strong></td><td>Extra 6s beyond Difficulty. Spent immediately on skill effects.</td></tr>
              <tr><td><strong>The Verdant Covenant</strong></td><td>Secret society the PCs serve. Three Divisions.</td></tr>
              <tr><td><strong>Zone</strong></td><td>Abstract combat area. 1 zone = 1 Fast Action to move.</td></tr>
            </tbody>
          </table>
