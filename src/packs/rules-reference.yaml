    # CHAPTER 3: CORE RESOLUTION
    # ══════════════════════════════════════════════════
    - name: 'Chapter 3: Core Resolution'
      type: text
      text:
        content: |
          <h2>The Dice Pool</h2>
          <p>Rolling dice should only occur when the outcome is <strong>uncertain</strong> and consequences of failure are <strong>dramatic</strong>. Both conditions must be true simultaneously.</p>
          <table>
            <thead><tr><th>Dice Type</th><th>Color</th><th>Source</th><th>Range</th></tr></thead>
            <tbody>
              <tr><td><strong>Attribute Dice</strong></td><td>White</td><td>Innate capability</td><td>1–5</td></tr>
              <tr><td><strong>Skill Dice</strong></td><td>Green</td><td>Trained proficiency</td><td>0–5</td></tr>
              <tr><td><strong>Gear Dice</strong></td><td>Black</td><td>Equipment bonus</td><td>0–3</td></tr>
            </tbody>
          </table>
          <p>Each <strong>6</strong> rolled counts as one success.</p>

          <h2>Success, Difficulty &amp; Extra Successes</h2>
          <table>
            <thead><tr><th>Difficulty</th><th>Use</th></tr></thead>
            <tbody>
              <tr><td><strong>1</strong></td><td>Standard risky task (default when not listed)</td></tr>
              <tr><td><strong>2</strong></td><td>Hard task, active resistance, or strong time pressure</td></tr>
              <tr><td><strong>3</strong></td><td>Severe pressure, expert resistance, or dangerous complexity</td></tr>
              <tr><td><strong>4</strong></td><td>Extreme task requiring unusual competence or luck</td></tr>
              <tr><td><strong>5+</strong></td><td>Near-impossible task</td></tr>
            </tbody>
          </table>
          <p>Successes beyond the required threshold are <strong>extra successes</strong>. Each extra success becomes <strong>1 Stunt Point</strong>. Stunt Points must be spent immediately — they cannot be saved between rolls.</p>
          <p><strong>Difficulty</strong> is how many successes a roll requires. A <strong>modifier</strong> (+X/−X) adds or removes dice from the pool. Both can stack.</p>

          <h2>The Push Mechanic</h2>
          <p>If an initial roll does not meet its Difficulty, or the player needs additional stunt points, they may <strong>push</strong> the roll — re-rolling all dice that do not currently show a 6.</p>
          <ul>
            <li>You immediately gain <strong>+1 Corruption</strong>.</li>
            <li><strong>Gear Dice are never re-rolled</strong> when pushing — they keep their initial values.</li>
            <li>Each roll may only be pushed once.</li>
          </ul>
          <p>Corruption is the only push cost. There is no separate Stress track.</p>

          <h2>Gear Degradation</h2>
          <ul>
            <li>If any Gear Die in the <strong>initial roll</strong> shows a <strong>1</strong>, the item's Gear Bonus is permanently reduced by 1 (until repaired).</li>
            <li>Gear Dice are <strong>never re-rolled when pushing</strong>.</li>
            <li>An item whose Gear Bonus reaches <strong>0</strong> is <strong>Broken</strong>.</li>
          </ul>
          <p>Applies identically to weapons, armor (Armor Rating −1), and tools. Improvised items break outright when their sole Gear Die shows a 1.</p>

          <h2>Opposed Rolls</h2>
          <p>Both sides roll simultaneously and compare total successes. Higher total wins.</p>
          <h3>Tie-Breaking</h3>
          <ul>
            <li><strong>PC vs. NPC:</strong> The PC wins.</li>
            <li><strong>NPC vs. NPC:</strong> No change.</li>
            <li><strong>PC vs. PC:</strong> DA rules in context.</li>
            <li><strong>Both zero:</strong> No change — situation remains unresolved.</li>
          </ul>
          <h3>Common Opposed Pairings</h3>
          <table>
            <thead><tr><th>Active Roll</th><th>Opposing Roll</th><th>Situation</th></tr></thead>
            <tbody>
              <tr><td>Sneak (AGI)</td><td>Investigate (WIT)</td><td>Moving past a guard / tailing</td></tr>
              <tr><td>Manipulate (EMP)</td><td>Psychoanalyze (EMP)</td><td>Lying to a target</td></tr>
              <tr><td>Command (EMP)</td><td>Manipulate (EMP)</td><td>Authority vs. persuasion</td></tr>
              <tr><td>Force (STR)</td><td>Endure (STR)</td><td>Overpowering / restraining</td></tr>
              <tr><td>Brawl (STR)</td><td>Brawl (STR)</td><td>Grapple, disarm, shove</td></tr>
              <tr><td>Deft Hands (AGI)</td><td>Investigate (WIT)</td><td>Planting/pocketing items</td></tr>
            </tbody>
          </table>

          <h2>Range Zones</h2>
          <table>
            <thead><tr><th>Zone</th><th>Distance</th><th>Context</th></tr></thead>
            <tbody>
              <tr><td><strong>Engaged</strong></td><td>Arm's reach</td><td>Melee contact, grappling</td></tr>
              <tr><td><strong>Close</strong></td><td>~10 m</td><td>Same room, short-range gunfight</td></tr>
              <tr><td><strong>Near</strong></td><td>~30 m</td><td>Across a courtyard, adjacent rooms</td></tr>
              <tr><td><strong>Far</strong></td><td>~100 m</td><td>Sniper positions, building perimeters</td></tr>
              <tr><td><strong>Very Far</strong></td><td>~300 m</td><td>Long-range rifles only</td></tr>
            </tbody>
          </table>

          <h2>Helping</h2>
          <ul>
            <li>Ally must be at Engaged or Close range with skill rating 1+ (or DA-approved justification).</li>
            <li>Each helper adds <strong>+1 die</strong> (Skill Die). Maximum <strong>2 helpers</strong>.</li>
            <li>Helpers do <strong>not</strong> gain Corruption when the active character pushes.</li>
            <li>In combat, helping costs a <strong>Slow Action</strong>.</li>
          </ul>

          <h2>Group Rolls</h2>
          <p>When the entire team attempts the same action simultaneously, each rolls individually. Compare how many succeed against the Group Success Threshold:</p>
          <table>
            <thead><tr><th>Threshold</th><th>When to Use</th></tr></thead>
            <tbody>
              <tr><td><strong>All succeed</strong></td><td>One failure has consequences (stealth approach)</td></tr>
              <tr><td><strong>Majority succeed</strong></td><td>Most of the team needs to make it</td></tr>
              <tr><td><strong>At least one</strong></td><td>Team needs one person to pull it off</td></tr>
            </tbody>
          </table>
          <p>Each character's push decision is independent. Characters who already succeeded cannot push.</p>

