    # CHAPTER 5: COMBAT
    # ══════════════════════════════════════════════════
    - name: 'Chapter 5: Combat'
      type: text
      text:
        content: |
          <h2>Initiative</h2>
          <p>Each participant draws an <strong>Initiative Card</strong> from a standard deck (Ace–10). Higher value acts first. Aces are low (value 1). Ties: draw replacements. Reshuffle each round.</p>
          <h3>Surprise &amp; Ambush</h3>
          <ul>
            <li>Ambush: <strong>Sneak (AGI)</strong> opposed by <strong>Investigate (WIT)</strong>.</li>
            <li>Success: free full round before initiative. Targets cannot Dodge or Parry.</li>
            <li>Failure: draw initiative normally.</li>
          </ul>

          <h2>Action Economy</h2>
          <p>Each turn: <strong>1 Slow Action</strong> + <strong>1 Fast Action</strong> + any Free Actions.</p>
          <h3>Slow Actions</h3>
          <table>
            <thead><tr><th>Action</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td><strong>Attack</strong></td><td>Roll to hit and deal damage</td></tr>
              <tr><td><strong>First Aid</strong></td><td>Heal skill to restore STR or treat Critical Injury</td></tr>
              <tr><td><strong>Reload</strong></td><td>Reload dry firearm (no roll)</td></tr>
              <tr><td><strong>Use Artifact</strong></td><td>Activate artifact properties (+Corruption by tier)</td></tr>
              <tr><td><strong>Help Ally</strong></td><td>+1 die to ally's next roll</td></tr>
              <tr><td><strong>Manipulate NPC</strong></td><td>Talk down or negotiate during combat</td></tr>
              <tr><td><strong>Parry</strong></td><td>Reactive — defend with melee weapon</td></tr>
            </tbody>
          </table>
          <h3>Fast Actions</h3>
          <table>
            <thead><tr><th>Action</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td><strong>Move 1 zone</strong></td><td>Move to adjacent zone</td></tr>
              <tr><td><strong>Draw/holster weapon</strong></td><td>Ready or stow a weapon</td></tr>
              <tr><td><strong>Take cover</strong></td><td>Move into cover in current zone</td></tr>
              <tr><td><strong>Stand up</strong></td><td>Rise from prone</td></tr>
              <tr><td><strong>Dodge</strong></td><td>Reactive — add AGI dice to defense</td></tr>
              <tr><td><strong>Use quick item</strong></td><td>Apply stim, crack light stick, etc.</td></tr>
            </tbody>
          </table>
          <p><strong>Movement:</strong> 1 zone = 1 Fast Action. 2 zones = Fast + Slow (whole turn). Max 2 zones/turn.</p>

          <h2>Zone Features</h2>
          <table>
            <thead><tr><th>Feature</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td><strong>Cramped</strong> (closets, car interiors)</td><td>Long weapons −2 dice. Movement in/out costs Slow Action.</td></tr>
              <tr><td><strong>Rough</strong> (rubble, slick floor)</td><td>Entering requires AGI roll (Diff 1) or fall prone.</td></tr>
              <tr><td><strong>Dark</strong></td><td>Investigate/Firearms/ranged lose half dice (min 1). Sneak +2.</td></tr>
              <tr><td><strong>Open</strong> (parking lots, fields)</td><td>No cover available. Ranged attacks gain +1 die.</td></tr>
              <tr><td><strong>Elevated</strong></td><td>+2 initiative value. Ranged attacks against suffer −1 die.</td></tr>
            </tbody>
          </table>

          <h2>Armor</h2>
          <p>Roll d6s equal to <strong>Armor Rating (AR)</strong>. Each 6 absorbs 1 damage. When an armor die rolls a 1, AR permanently reduced by 1 (until repaired).</p>
          <table>
            <thead><tr><th>Armor</th><th>AR</th><th>Notes</th></tr></thead>
            <tbody>
              <tr><td>Light jacket / heavy clothing</td><td>1</td><td>Minimal protection</td></tr>
              <tr><td>Leather / reinforced coat</td><td>2</td><td>Better vs blunt and blade</td></tr>
              <tr><td>Kevlar vest (standard)</td><td>3</td><td>Covenant-issue. CL 3</td></tr>
              <tr><td>Tactical plate vest</td><td>4</td><td>+1 Encumbrance. CL 4</td></tr>
              <tr><td>Full tactical kit</td><td>5</td><td>Maximum field armor</td></tr>
            </tbody>
          </table>

          <h2>Melee Combat</h2>
          <ul>
            <li><strong>Heavy melee</strong> (knife, crowbar, against armored target): Force (STR) + Weapon Gear Bonus</li>
            <li><strong>Fast melee</strong> (unarmed, quick knife work): Brawl (STR) + Weapon Gear Bonus</li>
            <li>Unarmed: base 1 Damage</li>
          </ul>
          <h3>Special Melee Maneuvers</h3>
          <table>
            <thead><tr><th>Maneuver</th><th>Skill</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td><strong>Grapple</strong></td><td>Brawl vs Force/Brawl</td><td>Target cannot move, use 2H weapons, or take Slow Actions. Break free costs Slow Action + opposed roll.</td></tr>
              <tr><td><strong>Shove</strong></td><td>Force vs Endure</td><td>Target pushed back 1 zone and knocked prone. May be lethal at edges.</td></tr>
              <tr><td><strong>Disarm</strong></td><td>Deft Hands vs Force/Brawl</td><td>Target drops held weapon at Engaged range.</td></tr>
              <tr><td><strong>Feint</strong></td><td>Brawl vs Wits</td><td>No damage. Target can't Dodge/Parry your next attack; +2 dice on next melee roll.</td></tr>
            </tbody>
          </table>

          <h2>Ranged Combat</h2>
          <p>Roll <strong>Firearms (AGI)</strong> + Weapon Gear Bonus.</p>
          <h3>Range Penalties</h3>
          <table>
            <thead><tr><th>Weapon</th><th>Engaged</th><th>Near</th><th>Short</th><th>Long</th><th>Distant</th></tr></thead>
            <tbody>
              <tr><td>Pistol (.38, 9mm)</td><td>−1</td><td>—</td><td>—</td><td>−1</td><td>Out</td></tr>
              <tr><td>Shotgun</td><td>+1 Dmg</td><td>—</td><td>—</td><td>−2</td><td>Out</td></tr>
              <tr><td>Assault Rifle</td><td>−2</td><td>−1</td><td>—</td><td>—</td><td>−1</td></tr>
              <tr><td>Thrown weapon</td><td>—</td><td>—</td><td>Out</td><td>Out</td><td>Out</td></tr>
            </tbody>
          </table>

          <h3>Cover</h3>
          <ul>
            <li><strong>Soft cover</strong> (car door, wooden desk): +2 AR vs ranged only.</li>
            <li><strong>Hard cover</strong> (concrete, engine block): +4 AR vs ranged only.</li>
            <li>Taking cover requires a Fast Action. Firing from cover loses the bonus that round.</li>
          </ul>

          <h3>Ammunition (Resource Die)</h3>
          <table>
            <thead><tr><th>Ammo State</th><th>Die</th><th>Notes</th></tr></thead>
            <tbody>
              <tr><td>Pistol — full magazine</td><td>d10</td><td>9mm, .38, .45</td></tr>
              <tr><td>Shotgun — full load</td><td>d8</td><td>Pump or semi-auto</td></tr>
              <tr><td>Rifle — full magazine</td><td>d8</td><td>Assault/battle rifle</td></tr>
              <tr><td>Half loaded (any)</td><td>d6</td><td>Partially used</td></tr>
              <tr><td>Low / scrounged</td><td>d4</td><td>Found ammo</td></tr>
              <tr><td>Drum / extended mag</td><td>d12</td><td>CL 4 special</td></tr>
            </tbody>
          </table>
          <p>Roll after every turn fired. On <strong>1–2</strong>: step down (d8→d6→d4→empty). At empty: weapon dry — Slow Action to reload.</p>
          <p><strong>Full Auto:</strong> Two separate attack rolls (same or split targets). Roll ammo die twice. −1 die on Firearms until next turn.</p>

          <h2>Reactive Actions</h2>
          <h3>Dodge (Fast Action)</h3>
          <ul>
            <li>After attack declared, before attacker rolls. Add <strong>Agility</strong> dice to defense.</li>
            <li>Attacker must get <em>strictly more</em> successes. Ties favor defender.</li>
            <li>Costs your next Fast Action.</li>
            <li>Cannot dodge if: no Fast Action remaining, prone, Grappled, or ambushed.</li>
          </ul>
          <h3>Parry (Slow Action)</h3>
          <ul>
            <li>After melee attack declared. Requires held melee weapon. Roll Brawl or Force.</li>
            <li>Match or exceed attacker = no damage. Beat by 2+ = attacker loses Slow Action next round.</li>
            <li>Costs your next Slow Action.</li>
            <li>Cannot parry: ranged attacks, unarmed shoves, or Damage 4+ weapons.</li>
          </ul>

          <h2>Combat Stunts</h2>
          <table>
            <thead><tr><th>Cost</th><th>Stunt</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>1</td><td><strong>Knock Prone</strong></td><td>Target must spend Fast Action to stand.</td></tr>
              <tr><td>1</td><td><strong>Disarm</strong></td><td>Target drops weapon at Engaged range.</td></tr>
              <tr><td>1</td><td><strong>Target Limb</strong></td><td>Hit specific limb — situational penalty until treated.</td></tr>
              <tr><td>1</td><td><strong>Push Back</strong></td><td>Target forced one zone away.</td></tr>
              <tr><td>1</td><td><strong>Scare</strong></td><td>Target makes Fear Check (FR 1).</td></tr>
              <tr><td>2</td><td><strong>Double Damage</strong></td><td>Deal weapon damage twice.</td></tr>
              <tr><td>2</td><td><strong>Suppressive Fire</strong></td><td>Target pinned — can't move without WIT roll (Diff 2).</td></tr>
              <tr><td>2</td><td><strong>Destroy Cover</strong></td><td>Target's cover destroyed after this attack.</td></tr>
              <tr><td>3</td><td><strong>Critical Hit</strong></td><td>Roll on Critical Injury table regardless of Broken state.</td></tr>
            </tbody>
          </table>

          <h2>Chase &amp; Pursuit</h2>
          <p>Track distance on 5-step track: <strong>Contact → Following → Closing → Widening → Escaped</strong>.</p>
          <ul>
            <li><strong>On foot:</strong> AGI + Sneak (stealth) or AGI + Endure (sprint).</li>
            <li><strong>By vehicle:</strong> WIT + Tech.</li>
            <li>Compare successes. Winner moves track 1 step. Attacks during chase at −1 die.</li>
            <li>At Widening: Sneak (Diff 2) to break chase entirely (once per chase).</li>
            <li>If pursuing reaches Contact: normal combat resumes.</li>
          </ul>

          <h2>Vehicles in Combat</h2>
          <ul>
            <li><strong>Vehicle as cover:</strong> Provides cover = vehicle Armor Rating (no degradation from 1s; vehicle takes Wear instead).</li>
            <li><strong>Attacking vehicles:</strong> Firearms or Force, Diff 1. Damage exceeding AR = 1 Wear each. At 5 Wear: disabled.</li>
            <li><strong>Targeting occupants:</strong> Called shot (1 stunt point) or open windows/doors. Closed = full AR. Open = half AR.</li>
          </ul>

          <h2>Mob Rules (3+ NPCs)</h2>
          <ul>
            <li>One Initiative card. Shared Strength pool = 3 per member (max 15).</li>
            <li>Attack: best individual's pool + bonus dice = number of extra members (max +3).</li>
            <li>At pool 0: mob Broken. DA narrates intermediate casualties at thresholds.</li>
          </ul>

          <h2>Ending Combat</h2>
          <ul>
            <li><strong>Retreat:</strong> Disengage freely if not Engaged. AGI roll (Diff 1) to break from melee. Then move up to 2 zones.</li>
            <li><strong>Broken PC:</strong> Incapacitated, Critical Injury rolled. Dies at end of scene if not stabilized.</li>
            <li><strong>Surrender:</strong> DA adjudication. PCs may always choose to surrender.</li>
          </ul>

    # ══════════════════════════════════════════════════
    # CHAPTER 6: SOCIAL CONFLICT
    # ══════════════════════════════════════════════════
    - name: 'Chapter 6: Social Conflict'
      type: text
      text:
        content: |
          <h2>NPC Disposition</h2>
          <table>
            <thead><tr><th>Score</th><th>State</th><th>Behavior</th></tr></thead>
            <tbody>
              <tr><td>5</td><td><strong>Open</strong></td><td>Wants to help. No roll needed for cooperation.</td></tr>
              <tr><td>4</td><td><strong>Cautious</strong></td><td>Willing to talk but holds back on sensitive topics.</td></tr>
              <tr><td>3</td><td><strong>Guarded</strong></td><td>Resistant. Sensitive rolls at Difficulty 2.</td></tr>
              <tr><td>2</td><td><strong>Hostile</strong></td><td>Uncooperative. May lie/deflect. Rolls at Difficulty 3.</td></tr>
              <tr><td>1</td><td><strong>Closed</strong></td><td>Won't engage. Must raise to 2 before rolls are possible.</td></tr>
            </tbody>
          </table>

          <h3>Shifting Disposition</h3>
          <p><strong>Up (+1):</strong> Successful Psychoanalyze (calm/reassure), successful Manipulate, showing good faith, presenting evidence, performing a service.</p>
          <p><strong>Down (−1):</strong> Failed Manipulate, detected deception, physical threats at Disposition 3+, revealing dangerous information.</p>
          <p>At <strong>Disposition 1</strong>, social rolls are impossible. Non-roll actions (evidence, concessions, removing threats) must restore to 2 first.</p>

          <h2>Social Rolls</h2>
          <p>Baseline Difficulty is set by current Disposition:</p>
          <ul>
            <li><strong>Disposition 4–5:</strong> Difficulty 1 for sensitive asks</li>
            <li><strong>Disposition 3:</strong> Difficulty 2 for sensitive asks</li>
            <li><strong>Disposition 2:</strong> Difficulty 3 for almost any ask</li>
            <li><strong>Disposition 1:</strong> No social roll possible</li>
          </ul>

          <h3>Manipulate (EMP)</h3>
          <ul>
            <li><strong>Success:</strong> NPC complies. Disposition +1.</li>
            <li><strong>Failure:</strong> Denied. Disposition −1.</li>
            <li><strong>Pushed failure:</strong> Disposition −2, +1 Corruption.</li>
          </ul>

          <h3>Command (EMP)</h3>
          <ul>
            <li>Does <strong>not</strong> work at Disposition 1. At Disposition 2: emergency directives only (Diff 2).</li>
            <li><strong>Success:</strong> NPC complies. No Disposition shift.</li>
            <li><strong>Failure:</strong> No Disposition shift, but authority undermined.</li>
          </ul>

          <h3>Psychoanalyze (EMP)</h3>
          <p><strong>Reading:</strong> DA reveals one truth about NPC state. Grants +1 die and −1 Difficulty on next social roll vs same NPC (same scene).</p>
          <p><strong>Stabilizing:</strong> Success = Disposition +2 (max 4). Failure = Disposition −1.</p>

          <h2>NPC Social Defense</h2>
          <p>Canny NPCs may roll opposed <strong>Psychoanalyze</strong> to read agents, or use <strong>lie detection</strong> (EMP + Psychoanalyze vs Manipulate). On NPC win, deception detected and Disposition −1.</p>
          <p>If DA calls active social defense during Manipulate: agent must meet Disposition-based Difficulty <em>and</em> beat NPC's opposing roll.</p>
          <p>NPCs with social defense: Empathy 3+ and Psychoanalyze 2. Untrained: Empathy alone.</p>

          <h2>Consequences of Failed Social Scenes</h2>
          <table>
            <thead><tr><th>Consequence</th><th>Example</th></tr></thead>
            <tbody>
              <tr><td><strong>Closed source</strong></td><td>NPC won't speak again this mission.</td></tr>
              <tr><td><strong>Alert raised</strong></td><td>NPC warns employer or faction.</td></tr>
              <tr><td><strong>Physical escalation</strong></td><td>Scene tips into violence.</td></tr>
              <tr><td><strong>Faction response</strong></td><td>Rival faction begins accelerating.</td></tr>
              <tr><td><strong>Trust erosion</strong></td><td>Standing loss within the Covenant.</td></tr>
            </tbody>
          </table>

          <h2>Pushing Social Rolls</h2>
          <table>
            <thead><tr><th>Skill</th><th>Pushed Failure</th></tr></thead>
            <tbody>
              <tr><td>Manipulate</td><td>Disposition −2 (instead of −1). +1 Corruption. Most punishing push.</td></tr>
              <tr><td>Command</td><td>No Disposition shift. NPC recognizes desperation. +1 Corruption.</td></tr>
              <tr><td>Psychoanalyze (Reading)</td><td>DA provides misleading information. +1 Corruption.</td></tr>
              <tr><td>Psychoanalyze (Stabilizing)</td><td>Disposition −2. +1 Corruption.</td></tr>
            </tbody>
          </table>

          <h2>Social Pressure &amp; Fear</h2>
          <ul>
            <li><strong>Supernatural revelation in social scene:</strong> Fear Check, FR 1–2.</li>
            <li><strong>Psychoanalyze on contaminated NPC:</strong> On failure = Fear Check (FR 2). On success = +1 Corruption (the only roll where success costs Corruption).</li>
          </ul>

          <h2>Multiple Agents</h2>
          <p>Helping rules apply. One agent is the social focal point. Others may help (+1 die), attempt their own Reading, or apply silent pressure. Only one focal agent per NPC at a time.</p>

    # ══════════════════════════════════════════════════
    # CHAPTER 7: HEALTH, DAMAGE & ARMOR
    # ══════════════════════════════════════════════════
    - name: 'Chapter 7: Health, Damage & Armor'
      type: text
      text:
        content: |
          <h2>Damage Types</h2>
          <table>
            <thead><tr><th>Type</th><th>Target Attribute</th><th>Sources</th></tr></thead>
            <tbody>
              <tr><td><strong>Physical</strong></td><td>Strength (violence) / Agility (hobbling)</td><td>Weapons, hazards, combat</td></tr>
              <tr><td><strong>Mental</strong></td><td>Wits (terror) / Empathy (grief)</td><td>Failed Fear checks, psychic attacks, social betrayal</td></tr>
              <tr><td><strong>Corruption</strong></td><td>Corruption track directly</td><td>Pushing, artifacts, occult exposure</td></tr>
            </tbody>
          </table>
          <p>The source specifies the damage type — the defender does not choose.</p>

          <h2>The Broken State</h2>
          <p>When any attribute reaches <strong>0</strong>:</p>
          <ul>
            <li>Character is immediately <strong>incapacitated</strong> — cannot take actions or move.</li>
            <li>Can speak briefly (a few words per round).</li>
            <li>Must roll on a <strong>Critical Injury table</strong> (D66).</li>
            <li>An ally may drag them (1 zone per Slow Action).</li>
          </ul>

          <h2>Death &amp; Dying</h2>
          <table>
            <thead><tr><th>State</th><th>Meaning</th></tr></thead>
            <tbody>
              <tr><td><strong>Broken / Unconscious</strong></td><td>Any attribute = 0. Critical Injury rolled. Can still be saved.</td></tr>
              <tr><td><strong>Dying</strong></td><td>Broken with a † Critical Injury — Death Check pending, or survived but injury is active (Bleeding, Gutted). Window closing.</td></tr>
              <tr><td><strong>Dead</strong></td><td>Death Check failed, instant-death result, or window expired.</td></tr>
            </tbody>
          </table>

          <h3>Simultaneous Injury Resolution</h3>
          <ol>
            <li><strong>Physical damage resolves first.</strong> Apply all damage, check Broken, roll Critical Injury.</li>
            <li><strong>Death Check resolves second.</strong> If Critical Injury requires it, resolve immediately.</li>
            <li><strong>Corruption threshold resolves third.</strong> After physical effects complete, check accumulated Corruption against threshold.</li>
          </ol>

          <h3>Death Check</h3>
          <p>Roll 1d6 when Critical Injury marked with †:</p>
          <ul>
            <li><strong>1–2:</strong> Character dies.</li>
            <li><strong>3–6:</strong> Survives — injury still applies and must be treated.</li>
          </ul>
          <p><strong>Medical Training talent:</strong> Ally spends Slow Action, Heal (EMP) Diff 2 → patient rolls d6+1 (death only on natural 1 — result 2).</p>

          <h3>Stabilization Window</h3>
          <ul>
            <li><strong>Within same scene:</strong> Ally may attempt to stabilize (see First Aid below).</li>
            <li><strong>End of scene without treatment:</strong> Character must roll Death Check unmodified. No ally assistance.</li>
            <li><strong>DOA (Critical Injury 66):</strong> Immediate Death Check — no window. Heal roll (Diff 4) required within same round, not same scene.</li>
          </ul>

          <h3>First Aid: Stabilizing a Dying Character</h3>
          <ul>
            <li><strong>Skill:</strong> Heal (EMP), Slow Action</li>
            <li><strong>Gear:</strong> First Aid Kit (+1). Without: −2 dice.</li>
            <li><strong>Difficulty:</strong> 2</li>
            <li><strong>Success:</strong> Dying state resolved. Broken but no longer dying. Stabilized characters regain consciousness after 1d6 minutes but remain Broken.</li>
            <li><strong>Failure:</strong> May retry. Character remains Dying — Death Check window continues.</li>
          </ul>

          <h2>Critical Injuries</h2>
          <ul>
            <li><strong>STR/AGI = 0:</strong> Physical Critical Injury table (D66).</li>
            <li><strong>WIT/EMP = 0:</strong> Mental &amp; Emotional Critical Injury table (D66).</li>
            <li>All mental critical injuries: <strong>+1 Corruption</strong> upon rolling.</li>
            <li>Some injuries grant permanent <strong>Insights</strong> — mechanical bonuses that persist even after treatment.</li>
          </ul>

          <h2>Attribute Recovery</h2>
          <table>
            <thead><tr><th>Method</th><th>Restored</th><th>Conditions</th></tr></thead>
            <tbody>
              <tr><td><strong>Short Rest (1 Shift)</strong></td><td>1 point each damaged attribute</td><td>Safe location, ~4 hours</td></tr>
              <tr><td><strong>Full Downtime</strong></td><td>All damage cleared</td><td>Between Case Files</td></tr>
              <tr><td><strong>Medical Aid (Heal check)</strong></td><td>+1 per success beyond Difficulty</td><td>First Aid Kit required</td></tr>
              <tr><td><strong>Infirmary (HQ)</strong></td><td>3 points per Shift</td><td>Keep's Infirmary facility</td></tr>
            </tbody>
          </table>

          <h2>Character Death &amp; Continuity</h2>
          <ul>
            <li>Gear returns to Stack. Division Item logged and returned.</li>
            <li>Dark Secrets may surface posthumously.</li>
            <li>Replacement enters at next Case File with XP = lowest-XP survivor.</li>
            <li>Deceased character's player chooses one legacy effect.</li>
          </ul>

    # ══════════════════════════════════════════════════
    # CHAPTER 8: CORRUPTION, FEAR & HEALING
    # ══════════════════════════════════════════════════
    - name: 'Chapter 8: Corruption, Fear & Healing'
      type: text
      text:
        content: |
          <h2>The Corruption Track</h2>
          <p>Starts at <strong>0</strong>. Maximum Threshold = <strong>10 + Empathy score</strong>. When Corruption <strong>exceeds</strong> threshold → permanent catatonia (character retirement).</p>

          <h2>Sources of Corruption</h2>
          <table>
            <thead><tr><th>Trigger</th><th>Corruption</th><th>Notes</th></tr></thead>
            <tbody>
              <tr><td>Pushing a Roll</td><td>+1</td><td>Exerting absolute limits invites psychic static.</td></tr>
              <tr><td>Division Talent activation</td><td>+1 (or free)</td><td>Talents marked — are free.</td></tr>
              <tr><td>Occult Exposure</td><td>+1 to +3</td><td>Witnessing entities, forbidden tomes. DA sets severity.</td></tr>
              <tr><td>Artifact Activation</td><td>+1 to +3</td><td>Cost by artifact tier.</td></tr>
              <tr><td>Fear Check (any 1s rolled)</td><td>+1</td><td>Only one Corruption regardless of how many 1s.</td></tr>
              <tr><td>Failed Fear Check</td><td>+1</td><td>In addition to 1s penalty.</td></tr>
              <tr><td>Psychoanalyze on contaminated NPC</td><td>+1</td><td>The only roll where <em>success</em> costs Corruption.</td></tr>
            </tbody>
          </table>

          <h2>Corruption Effects</h2>
          <table>
            <thead><tr><th>Corruption</th><th>Stage</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>1–3</td><td>Nosebleeds / Migraines</td><td>Intense pressure. Character maintains control.</td></tr>
              <tr><td>4–6</td><td>Auditory Hallucinations</td><td>Whispers. WIT roll (Diff 1) once/session to distinguish real from imagined.</td></tr>
              <tr><td>7–9</td><td>Eldritch Tremors</td><td>−1 die on Deft Hands &amp; Firearms. Visible twitches.</td></tr>
              <tr><td>10–12</td><td>Reality Distortion</td><td>Environment warps. Electronic gear degrades. Allies in zone +1 Corruption/scene.</td></tr>
              <tr><td>13–14</td><td>Fugue States</td><td>DA rolls d6/scene: 1–2 = DA controls character 1 round.</td></tr>
              <tr><td>15–17</td><td>Collapse of Self</td><td>−1 die all social rolls. Only reachable with threshold-expanding effects.</td></tr>
              <tr><td>Exceeds Threshold</td><td><strong>Catatonic Revelation</strong></td><td>Mind permanently breaks. Removed from campaign.</td></tr>
            </tbody>
          </table>

          <h2>Healing Corruption</h2>
          <table>
            <thead><tr><th>Method</th><th>Effect</th><th>Requirements</th></tr></thead>
            <tbody>
              <tr><td><strong>Anchor Scene</strong></td><td>Heal 1d4 Corruption</td><td>Once/session. Physically hold Anchor in safe, quiet moment.</td></tr>
              <tr><td><strong>Safe Scene Recovery</strong></td><td>Heal 1 Corruption</td><td>Once/session. Quiet scene, no threats. Different scene from Anchor.</td></tr>
              <tr><td><strong>Full Rest (24h)</strong></td><td>Heal = Empathy score</td><td>Secure, non-anomalous location. Between Case Files only.</td></tr>
              <tr><td><strong>Healing Talents</strong></td><td>Varies</td><td>Per talent description.</td></tr>
            </tbody>
          </table>
          <p><strong>Session Healing Cap:</strong> Max <strong>5 Corruption</strong> per session from in-session sources. Full Rest is not subject to this cap.</p>

          <h2>Fear Checks</h2>
          <p>A special binary roll. Does <strong>not</strong> use Difficulty. <strong>Cannot be pushed. Cannot receive helping dice.</strong></p>
          <ol>
            <li>Roll dice equal to current <strong>Wits</strong> (no skill modifier).</li>
            <li>One or more 6s = <strong>success</strong>.</li>
            <li>Any 1s rolled (even on success) = <strong>+1 Corruption</strong>.</li>
            <li>No 6s = <strong>failure:</strong> 1 Mental (WIT) damage + +1 Corruption + Panic Table.</li>
          </ol>
          <h3>Four Outcomes</h3>
          <table>
            <thead><tr><th>6s?</th><th>1s?</th><th>Result</th></tr></thead>
            <tbody>
              <tr><td>Yes</td><td>No</td><td>Clean pass. No consequence.</td></tr>
              <tr><td>Yes</td><td>Yes</td><td>Pass, but +1 Corruption.</td></tr>
              <tr><td>No</td><td>No</td><td>Fail: 1 WIT damage + +1 Corruption + Panic.</td></tr>
              <tr><td>No</td><td>Yes</td><td>Worst: 1 WIT damage + <strong>+2 Corruption</strong> + Panic.</td></tr>
            </tbody>
          </table>
          <blockquote><strong>Why higher Wits means more Corruption on success:</strong> Rolling more dice increases both the chance of a 6 (success) and the chance of a 1 (Corruption). A Wits-5 character who succeeds has ~60% chance of still gaining +1 Corruption. Sharper minds process more of what they saw. Fear is never free.</blockquote>

          <h3>Panic Table (d6)</h3>
          <table>
            <thead><tr><th>Roll</th><th>Response</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>1</td><td><strong>Fight</strong></td><td>Attack nearest creature (bare hands, single strike). Ends after one strike.</td></tr>
              <tr><td>2</td><td><strong>Flight</strong></td><td>Run max speed (2 zones/round) for 1d6 rounds. Drop items. Ally can restrain (opposed Brawl/Force).</td></tr>
              <tr><td>3</td><td><strong>Freeze</strong></td><td>Paralyzed. Can't move/speak/act. Psychoanalyze (Diff 1) or Fear source leaves.</td></tr>
              <tr><td>4</td><td><strong>Denial</strong></td><td>Treat supernatural as mundane rest of scene. Psychoanalyze (Diff 2) breaks it.</td></tr>
              <tr><td>5</td><td><strong>Compulsion</strong></td><td>Locked in repetitive behavior. Psychoanalyze (Diff 2) frees.</td></tr>
              <tr><td>6</td><td><strong>Fugue</strong></td><td>DA controls character rest of scene. Psychoanalyze (Diff 3) recovers.</td></tr>
            </tbody>
          </table>

          <h3>Fear Ratings</h3>
          <table>
            <thead><tr><th>Rating</th><th>Level</th><th>Examples</th><th>DA Frequency</th></tr></thead>
            <tbody>
              <tr><td>0</td><td>None</td><td>No Fear Check triggered.</td><td>—</td></tr>
              <tr><td>1</td><td>Unsettling</td><td>Wrong shadows, impossible sounds, extra figure in photo.</td><td>One check on first confrontation per scene.</td></tr>
              <tr><td>2</td><td>Disturbing</td><td>Possessed civilian, minor entity, ritualistic death scene.</td><td>One check on first confrontation per scene.</td></tr>
              <tr><td>3</td><td>Horrifying</td><td>Mid-tier entity manifested, artifact consuming a person.</td><td>Check each time entity acts against character.</td></tr>
              <tr><td>4</td><td>Shattering</td><td>Major named entity, impossible acts of scale.</td><td>Check each time entity acts against character.</td></tr>
              <tr><td>5</td><td>Annihilating</td><td>Class-5 entity, tear in physical space.</td><td>Check every round within sight.</td></tr>
            </tbody>
          </table>

          <h3>Anchor Table (d66)</h3>
          <table>
            <thead><tr><th>Roll</th><th>Anchor</th></tr></thead>
            <tbody>
