# Neon Relic — Rules Reference
# Single journal with chapter pages organized like the book
---
- _id: rules-reference
  name: Neon Relic — Rules Reference
  type: JournalEntry
  pages:
    - name: Dice Pool Basics
      type: text
      text:
        content: >
          <h2>The Dice Pool</h2>

          <p>When a player character attempts a risky action with uncertain outcome and dramatic consequences, they
          construct a dice pool of three elements:</p>

          <table>
            <thead><tr><th>Dice Type</th><th>Color</th><th>Source</th><th>Range</th></tr></thead>
            <tbody>
              <tr><td><strong>Attribute Dice</strong></td><td>White</td><td>Innate capability</td><td>1–5</td></tr>
              <tr><td><strong>Skill Dice</strong></td><td>Green</td><td>Trained proficiency</td><td>0–5</td></tr>
              <tr><td><strong>Gear Dice</strong></td><td>Black</td><td>Equipment bonus</td><td>0–3</td></tr>
            </tbody>
          </table>

          <p>Each <strong>6</strong> rolled counts as one success. Rolling dice should only occur when the outcome is
          uncertain <em>and</em> consequences of failure are dramatic.</p>
    - name: Success & Difficulty
      type: text
      text:
        content: >
          <h2>Success, Difficulty &amp; Extra Successes</h2>

          <p>Every standard skill roll has a <strong>Difficulty</strong>. If a rule does not list one, the default is
          <strong>1</strong>.</p>

          <table>
            <thead><tr><th>Difficulty</th><th>Use</th></tr></thead>
            <tbody>
              <tr><td><strong>1</strong></td><td>Standard risky task (default)</td></tr>
              <tr><td><strong>2</strong></td><td>Hard task, active resistance, or strong time pressure</td></tr>
              <tr><td><strong>3</strong></td><td>Severe pressure, expert resistance, or dangerous complexity</td></tr>
              <tr><td><strong>4</strong></td><td>Extreme task requiring unusual competence or luck</td></tr>
              <tr><td><strong>5+</strong></td><td>Near-impossible task</td></tr>
            </tbody>
          </table>

          <p>Successes beyond the required threshold are <strong>extra successes</strong>. Each extra success becomes
          <strong>1 Stunt Point</strong>. Stunt Points must be spent immediately — they cannot be saved between
          rolls.</p>

          <p><strong>Difficulty</strong> is how many successes a roll requires. A <strong>modifier</strong> (+X/−X) adds
          or removes dice from the pool. Both can stack.</p>
    - name: Push Mechanic
      type: text
      text:
        content: >
          <h2>The Push Mechanic</h2>

          <p>If an initial roll does not meet its Difficulty, or the player needs additional stunt points, they may
          <strong>push</strong> the roll — re-rolling all dice that do not currently show a 6.</p>

          <ul>
            <li>You immediately gain <strong>+1 Corruption</strong>.</li>
            <li><strong>Gear Dice are never re-rolled</strong> when pushing — they keep their initial values.</li>
            <li>Each roll may only be pushed once.</li>
          </ul>

          <p>Pushing represents the character exerting maximum physical, mental, or material effort. The Corruption cost
          is the only push penalty — there is no separate Stress track.</p>
    - name: Gear Degradation
      type: text
      text:
        content: >
          <h2>Gear Degradation</h2>

          <p>When you roll a dice pool that includes <strong>Gear Dice</strong>, you risk damaging the item:</p>

          <ul>
            <li>If any Gear Die in the <strong>initial roll</strong> shows a <strong>1</strong>, the item's Gear Bonus is permanently reduced by 1 (until repaired).</li>
            <li>Gear Dice are <strong>never re-rolled when pushing</strong>.</li>
            <li>An item whose Gear Bonus reaches <strong>0</strong> is <strong>Broken</strong> — it cannot be used until repaired.</li>
          </ul>

          <p>This rule applies identically to weapons (Gear Bonus −1), armor (Armor Rating −1), and tools. Improvised
          items break outright when their sole Gear Die shows a 1.</p>
    - name: Opposed Rolls
      type: text
      text:
        content: >
          <h2>Opposed Rolls</h2>

          <p>When two characters work directly against each other, both sides roll simultaneously and compare total
          successes. The side with more successes wins.</p>

          <h3>Procedure</h3>

          <ol>
            <li>Both characters construct dice pools normally (Attribute + Skill + Gear).</li>
            <li>Both roll simultaneously.</li>
            <li>Count 6s — these are successes.</li>
            <li>Higher total wins. Extra successes beyond the opposing total become Stunt Points.</li>
          </ol>

          <h3>Tie-Breaking</h3>

          <ul>
            <li><strong>PC vs. NPC:</strong> The PC wins.</li>
            <li><strong>NPC vs. NPC:</strong> No change.</li>
            <li><strong>PC vs. PC:</strong> DA rules in context.</li>
            <li><strong>Both zero:</strong> No change — situation remains unresolved.</li>
          </ul>

          <h3>Common Opposed Pairings</h3>

          <table>
            <thead><tr><th>Active Roll</th><th>Opposing Roll</th><th>Situation</th></tr></thead>
            <tbody>
              <tr><td>Sneak (AGI)</td><td>Investigate (WIT)</td><td>Moving past a guard / tailing</td></tr>
              <tr><td>Manipulate (EMP)</td><td>Psychoanalyze (EMP)</td><td>Lying to a target</td></tr>
              <tr><td>Command (EMP)</td><td>Manipulate (EMP)</td><td>Authority vs. persuasion</td></tr>
              <tr><td>Force (STR)</td><td>Endure (STR)</td><td>Overpowering / restraining</td></tr>
              <tr><td>Brawl (STR)</td><td>Brawl (STR)</td><td>Grapple, disarm, shove</td></tr>
              <tr><td>Sleight of Hand (AGI)</td><td>Investigate (WIT)</td><td>Planting/pocketing items</td></tr>
            </tbody>
          </table>
    - name: Range Zones
      type: text
      text:
        content: >
          <h2>Range Zones</h2>

          <table>
            <thead><tr><th>Zone</th><th>Distance</th><th>Context</th></tr></thead>
            <tbody>
              <tr><td><strong>Engaged</strong></td><td>Arm's reach</td><td>Melee contact, grappling</td></tr>
              <tr><td><strong>Close</strong></td><td>~10 m</td><td>Same room, short-range gunfight</td></tr>
              <tr><td><strong>Near</strong></td><td>~30 m</td><td>Across a courtyard, adjacent rooms</td></tr>
              <tr><td><strong>Far</strong></td><td>~100 m</td><td>Sniper positions, building perimeters</td></tr>
              <tr><td><strong>Very Far</strong></td><td>~300 m</td><td>Long-range rifles only</td></tr>
            </tbody>
          </table>

          <p>Helping requires <strong>Engaged or Close</strong> range. Most social rolls require at least
          <strong>Close</strong>.</p>
    - name: Helping
      type: text
      text:
        content: |
          <h2>Helping</h2>
          <h3>Requirements</h3>
          <ul>
            <li>Ally must be at Engaged or Close range.</li>
            <li>Ally must have rating 1+ in the relevant skill, or provide a plausible narrative justification (DA approval).</li>
          </ul>
          <h3>The Helping Bonus</h3>
          <ul>
            <li>Each helper adds <strong>+1 die</strong> (Skill Die) to the active character's pool.</li>
            <li>Maximum <strong>2 helpers</strong> per roll.</li>
            <li>Helpers do <strong>not</strong> gain Corruption when the active character pushes.</li>
            <li>In combat, helping costs a <strong>Slow Action</strong>.</li>
          </ul>
    - name: Group Rolls
      type: text
      text:
        content: |
          <h2>Group Rolls</h2>
          <p>When the entire team attempts the same action simultaneously:</p>
          <ol>
            <li>Each character rolls their individual dice pool.</li>
            <li>Count how many characters succeed.</li>
            <li>Compare against the <strong>Group Success Threshold</strong>:</li>
          </ol>
          <table>
            <thead><tr><th>Threshold</th><th>When to Use</th></tr></thead>
            <tbody>
              <tr><td><strong>All succeed</strong></td><td>Total team performance — one failure has consequences</td></tr>
              <tr><td><strong>Majority succeed</strong></td><td>Most of the team needs to make it</td></tr>
              <tr><td><strong>At least one</strong></td><td>The team needs one person to pull it off</td></tr>
            </tbody>
          </table>
          <p>Each character's push decision is independent. A character who already succeeded cannot push.</p>
    - name: Attributes
      type: text
      text:
        content: >
          <h2>Four Core Attributes</h2>

          <table>
            <thead><tr><th>Attribute</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td><strong>Strength</strong></td><td>Physical power, endurance, and fortitude against trauma.</td></tr>
              <tr><td><strong>Agility</strong></td><td>Motor skills, reflexes, balance, and precision.</td></tr>
              <tr><td><strong>Wits</strong></td><td>Perception, education, memory, and deductive reasoning.</td></tr>
              <tr><td><strong>Empathy</strong></td><td>Charisma, social intuition, reading behavior, and psychological resilience.</td></tr>
            </tbody>
          </table>

          <p>Attributes serve dual purposes: <strong>dice pools</strong> (added to skill rolls) and <strong>health
          pools</strong> (reduced by damage). If any attribute reaches 0, the agent is <strong>Broken</strong>.</p>
    - name: Skills List
      type: text
      text:
        content: |
          <h2>The Thirteen Core Skills</h2>
          <table>
            <thead><tr><th>Attribute</th><th>Skill</th><th>Application</th></tr></thead>
            <tbody>
              <tr><td rowspan="3"><strong>Strength</strong></td><td>Force</td><td>Breaking doors, forcing containment chambers</td></tr>
              <tr><td>Brawl</td><td>Hand-to-hand combat, wrestling cursed objects</td></tr>
              <tr><td>Endure</td><td>Resisting harsh environments, sustained injury</td></tr>
              <tr><td rowspan="3"><strong>Agility</strong></td><td>Sneak</td><td>Infiltrating facilities, bypassing security</td></tr>
              <tr><td>Sleight of Hand</td><td>Picking locks, pocketing artifacts, disarming traps</td></tr>
              <tr><td>Firearms</td><td>Period-accurate weaponry (.38 revolvers, shotguns)</td></tr>
              <tr><td rowspan="4"><strong>Wits</strong></td><td>Investigate</td><td>Searching crime scenes, analyzing forensic data</td></tr>
              <tr><td>Tech</td><td>Operating mainframes, hacking BBS, repairing equipment</td></tr>
              <tr><td>Lore</td><td>Decoding occult texts, identifying creatures and artifacts</td></tr>
              <tr><td>Heal</td><td>Field medicine, triage, emergency stabilization</td></tr>
              <tr><td rowspan="3"><strong>Empathy</strong></td><td>Manipulate</td><td>Bribing, deceiving, leveraging secrets</td></tr>
              <tr><td>Command</td><td>Directing civilians, asserting authority, coordinating team</td></tr>
              <tr><td>Psychoanalyze</td><td>Reading psychology, detecting deception, stabilizing trauma</td></tr>
            </tbody>
          </table>
          <h3>Skill Rating Caps</h3>
          <ul>
            <li><strong>At creation:</strong> Max 3 (except Division Key Skill: max 4)</li>
            <li><strong>During play:</strong> Max 5 via XP</li>
            <li><strong>Unranked (0):</strong> Roll Attribute Dice only — no untrained penalty</li>
          </ul>
    - name: Stunt Tables
      type: text
      text:
        content: >
          <h2>Skill Stunts</h2>

          <p>Extra 6s beyond the minimum needed to succeed become <strong>Stunt Points</strong>. Must be spent
          immediately.</p>

          <h3>Generic Stunts (Any Skill)</h3>

          <table>
            <thead><tr><th>Cost</th><th>Stunt</th><th>Effect</th></tr></thead>
            <tbody>
