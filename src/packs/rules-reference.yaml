    # CHAPTER 9: DIVISIONS
    # ══════════════════════════════════════════════════
    - name: 'Chapter 9: Divisions'
      type: text
      text:
        content: |
          <h2>Division 1: Wayfinder</h2>
          <p><em>"What is found must be known."</em></p>
          <p>Primary investigative arm. Scholars, hackers, and researchers uncovering artifact locations.</p>
          <table>
            <thead><tr><th>Property</th><th>Value</th></tr></thead>
            <tbody>
              <tr><td>Key Attributes</td><td>Wits, Empathy</td></tr>
              <tr><td>Key Skill (Cap 4)</td><td>Lore</td></tr>
              <tr><td>Starting CL</td><td>3</td></tr>
              <tr><td>Division Item</td><td>Verdant Codex</td></tr>
              <tr><td>Sub-units</td><td>Research Wing, Counterintelligence Wing</td></tr>
            </tbody>
          </table>
          <h3>Wayfinder Talents</h3>
          <table>
            <thead><tr><th>Talent</th><th>Cost</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>The Antiquarian's Eye</td><td>+1</td><td>Identify artifact trigger or effect without Lore roll.</td></tr>
              <tr><td>Ghost in the Machine</td><td>+1</td><td>Interface with anomalous electronics via Tech.</td></tr>
              <tr><td>The Hunch</td><td>+1</td><td>Ask DA one yes/no question (truthful answer).</td></tr>
              <tr><td>Academic Grounding</td><td>—</td><td>Research entity for 1 hour; heal 1 Corruption.</td></tr>
              <tr><td>Eldritch Empathy</td><td>+1</td><td>Sense entity's emotional state or intent.</td></tr>
            </tbody>
          </table>

          <h2>Division 2: Recovery</h2>
          <p><em>"What is known must be contained."</em></p>
          <p>Field retrieval arm. Go in and bring the artifact out.</p>
          <table>
            <thead><tr><th>Property</th><th>Value</th></tr></thead>
            <tbody>
              <tr><td>Key Attributes</td><td>Strength, Agility</td></tr>
              <tr><td>Key Skill (Cap 4)</td><td>Firearms</td></tr>
              <tr><td>Starting CL</td><td>2</td></tr>
              <tr><td>Division Item</td><td>Verdant Satchel</td></tr>
              <tr><td>Sub-units</td><td>Ex-Agency Operative, Heavy-Hitter, Acquisition Specialist</td></tr>
            </tbody>
          </table>
          <h3>Recovery Talents</h3>
          <table>
            <thead><tr><th>Talent</th><th>Cost</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>Conditioned Mind</td><td>—</td><td>1/session: push without Corruption cost (declare before push).</td></tr>
              <tr><td>Unstoppable Force</td><td>+1</td><td>Next melee attack +2 damage.</td></tr>
              <tr><td>Shadow Walker</td><td>+1</td><td>Imperceptible to mundane detection for a scene.</td></tr>
              <tr><td>Adrenaline Junkie</td><td>—</td><td>When STR damaged: +2 dice on AGI rolls.</td></tr>
              <tr><td>Gallows Humor</td><td>—</td><td>After combat: you + hearing allies heal 1d4 Corruption.</td></tr>
              <tr><td>Combat Reflexes</td><td>—</td><td>Draw 2 initiative cards, keep 1.</td></tr>
            </tbody>
          </table>

          <h2>Division 3: The Keep</h2>
          <p><em>"What is contained must be guarded."</em></p>
          <p>Custodial authority. Handling, documentation, containment, and protection of artifacts.</p>
          <table>
            <thead><tr><th>Property</th><th>Value</th></tr></thead>
            <tbody>
              <tr><td>Key Attributes</td><td>Empathy, Wits</td></tr>
              <tr><td>Key Skill (Cap 4)</td><td>Command</td></tr>
              <tr><td>Starting CL</td><td>3</td></tr>
              <tr><td>Division Item</td><td>Warden's Bracer</td></tr>
              <tr><td>Sub-units</td><td>Catalogers, Wardens, Internal CI, Stack (Logistics)</td></tr>
            </tbody>
          </table>

          <h2>Division Items</h2>
          <table>
            <thead><tr><th>Division</th><th>Item</th><th>Functions</th></tr></thead>
            <tbody>
              <tr><td>Wayfinder</td><td><strong>Verdant Codex</strong></td><td>+1 Lore/Investigate die (1/scene); preserves written knowledge; faintly glows near ancient magic; living map of artifact correlations.</td></tr>
              <tr><td>Recovery</td><td><strong>Verdant Satchel</strong></td><td>Suppresses artifact aura (no passive Corruption); warns of instability; delays activation 1 round (1/scene); basic field tools.</td></tr>
              <tr><td>The Keep</td><td><strong>Warden's Bracer</strong></td><td>+1 AR; absorbs 1 Corruption/session (automatic); dampens emissions; warns of containment failure.</td></tr>
            </tbody>
          </table>

