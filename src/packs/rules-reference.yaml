    # CHAPTER 4: ATTRIBUTES & SKILLS
    # ══════════════════════════════════════════════════
    - name: 'Chapter 4: Attributes & Skills'
      type: text
      text:
        content: |
          <h2>Four Core Attributes</h2>
          <table>
            <thead><tr><th>Attribute</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td><strong>Strength</strong></td><td>Physical power, raw endurance, and fortitude against physical trauma.</td></tr>
              <tr><td><strong>Agility</strong></td><td>Motor skills, physical reflexes, balance, and precision.</td></tr>
              <tr><td><strong>Wits</strong></td><td>Sensory perception, education, memory recall, and deductive reasoning.</td></tr>
              <tr><td><strong>Empathy</strong></td><td>Charisma, social intuition, ability to read human behavior, and emotional resilience.</td></tr>
            </tbody>
          </table>
          <p>Attributes serve dual purposes: <strong>dice pools</strong> (added to skill rolls) and <strong>health pools</strong> (reduced by damage). If any attribute reaches 0, the agent is <strong>Broken</strong>.</p>

          <h2>The Thirteen Core Skills</h2>
          <table>
            <thead><tr><th>Attribute</th><th>Skill</th><th>Application</th></tr></thead>
            <tbody>
              <tr><td rowspan="3"><strong>Strength</strong></td><td>Force</td><td>Breaking doors, forcing containment chambers, overpowering opponents</td></tr>
              <tr><td>Brawl</td><td>Hand-to-hand combat, wrestling cursed objects, grappling</td></tr>
              <tr><td>Endure</td><td>Resisting harsh environments, sustained injury, pushing through pain</td></tr>
              <tr><td rowspan="3"><strong>Agility</strong></td><td>Sneak</td><td>Infiltrating facilities, bypassing security, tailing suspects</td></tr>
              <tr><td>Deft Hands</td><td>Picking locks, pocketing artifacts, disarming traps, planting evidence</td></tr>
              <tr><td>Firearms</td><td>Period-accurate weaponry (.38 revolvers, shotguns, rifles)</td></tr>
              <tr><td rowspan="3"><strong>Wits</strong></td><td>Investigate</td><td>Searching crime scenes, analyzing forensic data, spotting details</td></tr>
              <tr><td>Tech</td><td>Operating mainframes, hacking BBS, repairing equipment, driving vehicles</td></tr>
              <tr><td>Lore</td><td>Decoding occult texts, identifying creatures and artifacts, ritual knowledge</td></tr>
              <tr><td rowspan="4"><strong>Empathy</strong></td><td>Manipulate</td><td>Bribing, deceiving, leveraging secrets, persuading</td></tr>
              <tr><td>Command</td><td>Directing civilians, asserting authority, coordinating team actions</td></tr>
              <tr><td>Psychoanalyze</td><td>Reading psychology, detecting deception, stabilizing trauma victims</td></tr>
              <tr><td>Heal</td><td>Treating psychological damage, stabilizing mental trauma through empathy and connection</td></tr>
            </tbody>
          </table>

          <h3>Skill Rating Caps</h3>
          <ul>
            <li><strong>At creation:</strong> Max 3 (except Division Key Skill: max 4)</li>
            <li><strong>During play:</strong> Max 5 via XP</li>
            <li><strong>Unranked (0):</strong> Roll Attribute Dice only — no untrained penalty</li>
          </ul>

          <h2>Stunts</h2>
          <p>Extra 6s beyond the minimum needed to succeed become <strong>Stunt Points</strong>. Must be spent immediately.</p>

          <h3>Stunts</h3>
          <table>
            <thead><tr><th>Cost</th><th>Stunt</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td>1</td><td><strong>Faster</strong></td><td>Complete the action in half the expected time.</td></tr>
              <tr><td>1</td><td><strong>Quieter</strong></td><td>No detectable trace left behind.</td></tr>
              <tr><td>1</td><td><strong>Precise</strong></td><td>Exact intended result — no collateral effects.</td></tr>
              <tr><td>1</td><td><strong>Aid</strong></td><td>Ally gains +1 die on next related roll this scene.</td></tr>
              <tr><td>2</td><td><strong>Extended Effect</strong></td><td>Outcome lasts an additional scene or 1+ hours.</td></tr>
              <tr><td>2</td><td><strong>Additional Target</strong></td><td>Results apply to one additional target in zone.</td></tr>
            </tbody>
          </table>

