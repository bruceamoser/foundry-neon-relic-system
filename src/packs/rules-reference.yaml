# Neon Relic — Rules Reference
# Organized by book chapter to match the rulebook structure
---
- _id: rules-reference
  name: Neon Relic — Rules Reference
  type: JournalEntry
  pages:
    # ══════════════════════════════════════════════════
    # CHAPTER 1: INTRODUCTION
    # ══════════════════════════════════════════════════
    - name: 'Chapter 1: Introduction'
      type: text
      text:
        content: |
          <h2>What This Game Is</h2>
          <ul>
            <li><strong>Episodic investigation.</strong> Each session follows a structured Case File — an "artifact-of-the-week" mystery driven by artifact recovery, faction interference, and occult threats.</li>
            <li><strong>Base management between missions.</strong> The team maintains a Headquarters — a Covenant facility they upgrade, staff, and defend over the course of a campaign.</li>
            <li><strong>Psychological attrition.</strong> The real threat is not the monsters. It is the toll the work takes on the agents. Corruption accumulates from pushing rolls, using supernatural abilities, and confronting the unnatural. It does not go away easily. Characters who cross the threshold are permanently retired.</li>
            <li><strong>Analog procedural thriller.</strong> No internet. No GPS. No cell phones. Investigations require physical legwork, face-to-face conversations, and fragile 1980s technology that degrades under use.</li>
          </ul>

          <h2>The Verdant Covenant</h2>
          <p>The Verdant Covenant is a secret society devoted to the discovery, recovery, and protection of artifacts of magical, religious, occult, and cultural significance. It maintains exactly <strong>441 active members worldwide at all times</strong> — the Square of Harmony.</p>

          <h3>Organizational Structure</h3>
          <table>
            <thead><tr><th>Division</th><th>Motto</th><th>Purpose</th></tr></thead>
            <tbody>
              <tr><td><strong>Wayfinder</strong></td><td><em>"What is found must be known."</em></td><td>Scholars and researchers who uncover the existence and locations of lost artifacts.</td></tr>
              <tr><td><strong>Recovery</strong></td><td><em>"What is known must be contained."</em></td><td>Field agents who retrieve relics from ruins, vaults, corporations, and those who would misuse them.</td></tr>
              <tr><td><strong>The Keep</strong></td><td><em>"What is contained must be guarded."</em></td><td>Wardens and archivists who guard the Covenant's vaults and ensure dangerous artifacts remain contained.</td></tr>
            </tbody>
          </table>

          <h3>Quick Response Teams (QRTs)</h3>
          <p>Your agents are a QRT — an ad-hoc field unit assembled from agents across all three Divisions, deployed to handle situations that require the full locate-retrieve-contain cycle in compressed, dangerous timeframes. QRT activation is uncommon. The cases your team receives are the ones that can't wait.</p>

          <h3>Defining "Session"</h3>
          <p>Throughout this book, "once per session" means once per continuous play session at your table — typically 3 to 4 hours. If your group plays significantly shorter sessions (under 2 hours), the DA may allow once-per-session abilities to carry over. If your group plays extended sessions (6+ hours), the DA may reset once-per-session abilities at a natural midpoint.</p>

    # ══════════════════════════════════════════════════
    # CHAPTER 2: CHARACTER CREATION
    # ══════════════════════════════════════════════════
    - name: 'Chapter 2: Character Creation'
      type: text
      text:
        content: |
          <h2>Creating Your Agent — 11 Steps</h2>

          <h3>Step 1: Choose Your Division</h3>
          <table>
            <thead><tr><th>Division</th><th>Role</th><th>Base CL</th><th>Key Attributes</th></tr></thead>
            <tbody>
              <tr><td><strong>Wayfinder</strong></td><td>Research and intelligence</td><td>3</td><td>Wits, Empathy</td></tr>
              <tr><td><strong>Recovery</strong></td><td>Field retrieval</td><td>2</td><td>Strength, Agility</td></tr>
              <tr><td><strong>The Keep</strong></td><td>Vault security, custody, logistics</td><td>3</td><td>Empathy, Wits</td></tr>
            </tbody>
          </table>

          <blockquote><strong>Clearance Level (CL) vs. Covenant Standing:</strong> CL is an equipment authorization tier — it determines what gear you can requisition. Standing is institutional reputation — it gates information access, advanced HQ facilities, and some talent prerequisites. High CL means the Covenant will hand you a suppressed rifle. High Standing means the Covenant will tell you <em>why</em> you need one.</blockquote>

          <h3>Step 2: Choose Your Department or Background</h3>
          <ul>
            <li><strong>Wayfinder:</strong> Choose a Wing — Research or Counterintelligence. Within that, choose a specialty.</li>
            <li><strong>Recovery:</strong> Choose a Paradigm — Ex-Agency Operative, Heavy-Hitter, or Acquisition Specialist. Within that, choose a specialty.</li>
            <li><strong>The Keep:</strong> Choose a Department — Catalogers, Wardens, Internal CI, or Stack (Logistics). Within that, choose a specialty.</li>
          </ul>

          <h3>Step 3: Choose Age Group &amp; Distribute Attribute Points</h3>
          <table>
            <thead><tr><th>Age Group</th><th>Age Range</th><th>Attribute Points</th><th>Skill Points</th><th>CL Modifier</th></tr></thead>
            <tbody>
              <tr><td><strong>Young</strong></td><td>22–28</td><td>14</td><td>10</td><td>−1</td></tr>
              <tr><td><strong>Experienced</strong></td><td>29–38</td><td>13</td><td>12</td><td>+0</td></tr>
              <tr><td><strong>Senior</strong></td><td>39–52</td><td>12</td><td>14</td><td>+1</td></tr>
            </tbody>
          </table>
          <p>Each attribute has a minimum of <strong>2</strong> and maximum of <strong>5</strong>.</p>
          <table>
            <thead><tr><th>Attribute</th><th>Range</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td><strong>Strength</strong></td><td>2–5</td><td>Physical power, endurance, and resistance to bodily harm.</td></tr>
              <tr><td><strong>Agility</strong></td><td>2–5</td><td>Reflexes, coordination, fine motor control, and speed.</td></tr>
              <tr><td><strong>Wits</strong></td><td>2–5</td><td>Perception, memory, deductive reasoning, and technical aptitude.</td></tr>
              <tr><td><strong>Empathy</strong></td><td>2–5</td><td>Charisma, social intuition, and resistance to psychological horror.</td></tr>
            </tbody>
          </table>
          <blockquote><strong>Attributes as Health Pools:</strong> Your four attributes serve a dual purpose — they define your dice pools <em>and</em> they are your health. Physical damage reduces Strength, hobbling reduces Agility, mental horror reduces Wits, emotional trauma reduces Empathy. When any attribute reaches 0, your agent is <strong>Broken</strong>.</blockquote>

          <h3>Step 4: Distribute Skill Points</h3>
          <p>No single skill may exceed <strong>3</strong> at character creation, except your Division's Key Skill which may reach <strong>4</strong>.</p>
          <table>
            <thead><tr><th>Division</th><th>Key Skill (Cap 4)</th></tr></thead>
            <tbody>
              <tr><td>Wayfinder</td><td>Lore</td></tr>
              <tr><td>Recovery</td><td>Firearms</td></tr>
              <tr><td>The Keep</td><td>Command</td></tr>
            </tbody>
          </table>
          <p>Unranked skills (0): Roll only Attribute Dice — no "untrained" restriction.</p>

          <h3>Step 5: Choose 3 Starting Talents</h3>
          <table>
            <thead><tr><th>Slot</th><th>Choose From</th></tr></thead>
            <tbody>
              <tr><td><strong>Division or General Talent</strong></td><td>One talent from your Division's talent list OR one General Talent (not both).</td></tr>
              <tr><td><strong>Sub-unit Talent</strong></td><td>One talent from your Wing / Paradigm / Department list.</td></tr>
              <tr><td><strong>Background Talent</strong></td><td>One from the Background Talents list. Always passive — no activation cost.</td></tr>
            </tbody>
          </table>

          <h3>Step 6: Record Starting Statistics</h3>
          <table>
            <thead><tr><th>Statistic</th><th>Starting Value</th></tr></thead>
            <tbody>
              <tr><td><strong>Clearance Level (CL)</strong></td><td>Division base CL + Age Group modifier (minimum 1)</td></tr>
              <tr><td><strong>Corruption</strong></td><td>0</td></tr>
              <tr><td><strong>Max Corruption Threshold</strong></td><td>10 + Empathy score</td></tr>
            </tbody>
          </table>

          <h3>Step 7: Claim Your Division Item</h3>
          <table>
            <thead><tr><th>Division</th><th>Item</th><th>Abilities</th></tr></thead>
            <tbody>
              <tr><td>Wayfinder</td><td><strong>Verdant Codex</strong></td><td>Secures memory, assists with language/symbol work, highlights correlations, preserves documents.</td></tr>
              <tr><td>Recovery</td><td><strong>Verdant Satchel</strong></td><td>Masks artifact signatures, stabilizes transport, warns of instability, keeps basic field tools ready.</td></tr>
              <tr><td>The Keep</td><td><strong>Warden's Bracer</strong></td><td>Dampens emissions during handling, warns of containment failure, absorbs 1 Corruption/session, +1 Armor Rating.</td></tr>
            </tbody>
          </table>

          <h3>Step 8: Select Starting Gear</h3>
          <p>Each agent begins with a Division-appropriate kit. Gear beyond the standard kit requires a Clearance Level roll during the Equipping Phase.</p>

          <h3>Step 9: Choose Your Anchor</h3>
          <p>A tangible physical object tied to a core humanizing memory from before the Covenant. Once per session, dedicate a scene to your Anchor — heal <strong>1d4 Corruption</strong>. Roll d66 on the Anchor Table (see Corruption, Fear &amp; Healing chapter) or create your own.</p>

          <h3>Step 10: Choose Your Dark Secret</h3>
          <p>Something specific from your past that the DA can use as a story hook. XP question: "Did your Dark Secret complicate the mission?" = +1 XP. See Advancement chapter for Division-specific examples.</p>

          <h3>Step 11: Name, Country of Origin, and Biography</h3>
          <p>Choose a name appropriate for the 1980s setting. Record Country of Origin. Write 2–3 sentences of biography.</p>

