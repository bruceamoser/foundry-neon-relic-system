          <h2>HQ Upgrade Tree</h2>
          <h3>Tier 1 (No prerequisites)</h3>
          <ul>
            <li><strong>Secure Comms Room</strong> (2 DP) — +1 Command die for contacts; free contact call/downtime.</li>
            <li><strong>Basic Medical Bay</strong> (2 DP) — +2 Attribute recovery/downtime; clear non-lethal criticals.</li>
