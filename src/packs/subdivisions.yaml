      - name: Chalk
        type: consumable
        pack: neon-relic.gear
      - name: Crowbar
        type: weapon
        pack: neon-relic.weapons-armor
      - name: Field Jacket
        type: gear
        pack: neon-relic.gear
    description: >-
      <p>Ex-Agency Operatives bring tradecraft from intelligence services.
      They run covert assets, breach hostile positions, and operate deep
      undercover for extended periods.</p>

- _id: sub-r02
  name: Heavy-Hitter
  type: subdivision
