    divisionItemName: "Warden's Bracer"
    specialties:
      - key: counter-exposure-analyst
        label: Counter-Exposure Analyst
        description: >-
          Monitors internal communications and personnel behavior for signs
          of information leaks, unauthorized disclosure, or ideological
          compromise. Conducts silent internal audits.
      - key: infiltration-investigator
        label: Infiltration Investigator
        description: >-
          Investigates active external threats against Covenant facilities,
          personnel, or networks. Tracks hostile actors and builds operational
          cases against suspected infiltrators.
      - key: vetting-officer
        label: Vetting Officer
        description: >-
          Conducts background assessments and ongoing clearance monitoring
          for Covenant recruits and active personnel. Identifies vulnerabilities
          and security risks before they can be exploited.
    startingGear:
      - name: Containment Kit
        type: gear
        pack: neon-relic.gear
      - name: Lore Reference Binder
        type: gear
        pack: neon-relic.gear
      - name: Formal Attire
        type: gear
        pack: neon-relic.gear
    description: >-
      <p>Internal CI monitors personnel behavior, investigates external
      threats, and conducts background assessments and clearance monitoring.</p>

