      - name: Rope (50 ft)
        type: gear
        pack: neon-relic.gear
      - name: Chalk
        type: consumable
        pack: neon-relic.gear
      - name: Crowbar
        type: weapon
        pack: neon-relic.weapons-armor
      - name: Field Jacket
        type: gear
        pack: neon-relic.gear
    description: >-
      <p>Heavy-Hitters are the Covenant's blunt instruments — enforcers,
      bodyguards, and demolition specialists who overwhelm threats through
      raw physical force.</p>

- _id: sub-r03
  name: Acquisition Specialist
  type: subdivision
  system:
    division: recovery
    talentKey: acquisition
    keySkill: firearms
    baseCL: 2
    divisionItemName: Verdant Satchel
    specialties:
      - key: infiltrator
        label: Infiltrator
        description: >-
          Defeats physical and electronic security systems. Expert in
          lock-picking, alarm bypass, safe-cracking, and navigating laser
          grids, pressure plates, and motion detectors.
      - key: grifter
        label: Grifter
        description: >-
          Operates through social engineering and deception. Assumes false
          identities, manipulates targets through conversation, and acquires
          access through charm, forgery, or confidence games.
      - key: wheelman
        label: Wheelman
        description: >-
          Specialist driver, pilot, and escape planner. Handles pursuit,
          evasion, and extraction logistics. Ensures the team reaches the
          target and leaves cleanly with the artifact.
