# ── WAYFINDER ───────────────────────────────
- _id: sub-w01
  name: Research Wing
  type: subdivision
  system:
    division: wayfinder
    talentKey: research
    keySkill: lore
    baseCL: 3
    divisionItemName: Verdant Codex
    specialties:
      - key: research-desk-analyst
        label: Research Desk Analyst
        description: >-
          Focuses on research within Covenant archives and partner repositories.
          Studies historical documents, translates ancient texts, analyzes cultural
          and religious records, and monitors scholarly publications.
      - key: research-field-analyst
        label: Research Field Analyst
        description: >-
          Conducts investigative work outside Covenant facilities. Visits
          archaeological sites, examines ruins, interviews scholars or local
          witnesses, and verifies Desk Analyst intelligence.
      - key: research-liaison
        label: Research Liaison
        description: >-
          Embeds with academic institutions, museums, and partner agencies to
          cultivate intelligence relationships through official channels.
          Maintains scholarly cover identities and routes actionable field
          intelligence back to the Desk.
    startingGear:
      - name: Briefcase
        type: gear
        pack: neon-relic.gear
      - name: Camera (35mm)
        type: gear
        pack: neon-relic.gear
      - name: Forged Credentials
        type: gear
        pack: neon-relic.gear
      - name: Civilian Clothing
        type: gear
        pack: neon-relic.gear
      - name: Knife
        type: weapon
        pack: neon-relic.weapons-armor
    description: >-
      <p>The Research Wing studies historical documents, translates ancient texts,
      analyzes cultural records, and conducts investigative fieldwork at
      archaeological sites and scholarly institutions.</p>

- _id: sub-w02
  name: Counterintelligence Wing
  type: subdivision
  system:
    division: wayfinder
    talentKey: counterintelligence
    keySkill: lore
    baseCL: 3
    divisionItemName: Verdant Codex
    specialties:
      - key: ci-desk-analyst
        label: Counterintelligence Desk Analyst
        description: >-
          Monitors global communications, public records, academic publications,
          and intelligence reports for indications that artifacts have been
          discovered, trafficked, or targeted.
      - key: ci-field-analyst
        label: Counterintelligence Field Analyst
        description: >-
          Operates outside Covenant facilities to investigate threats directly.
          Conducts surveillance of suspicious organizations, infiltrates groups
          seeking artifacts, and disrupts activities that could expose the Covenant.
      - key: ci-technical-analyst
        label: Counterintelligence Technical Analyst
        description: >-
          Specializes in signals intelligence, electronic surveillance, and
          cryptographic analysis of intercepted communications. Operates
          wire-taps, intercepts radio traffic, and deciphers coded correspondence.
    startingGear:
      - name: Briefcase
        type: gear
        pack: neon-relic.gear
      - name: Camera (35mm)
        type: gear
        pack: neon-relic.gear
      - name: Forged Credentials
        type: gear
        pack: neon-relic.gear
      - name: Civilian Clothing
        type: gear
        pack: neon-relic.gear
      - name: Knife
        type: weapon
        pack: neon-relic.weapons-armor
    description: >-
      <p>The Counterintelligence Wing monitors global communications, investigates
      threats, conducts surveillance, and disrupts activities that could expose
      the Covenant.</p>

# ── RECOVERY ────────────────────────────────
- _id: sub-r01
  name: Ex-Agency Operative
  type: subdivision
  system:
    division: recovery
    talentKey: ex-agency
    keySkill: firearms
    baseCL: 2
    divisionItemName: Verdant Satchel
    specialties:
      - key: handler
        label: Handler
        description: >-
          Runs covert assets and informants. Expert in managing human
          intelligence networks, dead drops, and clandestine communications.
      - key: breacher
        label: Breacher
        description: >-
          Specializes in hostile entry and extraction under fire. Trained in
          demolitions, close-quarters combat, and rapid building clearance.
          First through the door when negotiations fail.
      - key: ghost
        label: Ghost
        description: >-
          Operates deep undercover for extended periods. Maintains false
          identities, embeds within hostile organizations, and reports
          intelligence without breaking cover.
    startingGear:
