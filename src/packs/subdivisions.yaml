        type: gear
        pack: neon-relic.gear
      - name: Rope (50 ft)
        type: gear
        pack: neon-relic.gear
      - name: Chalk
        type: consumable
        pack: neon-relic.gear
      - name: Crowbar
        type: weapon
        pack: neon-relic.weapons-armor
      - name: Field Jacket
        type: gear
        pack: neon-relic.gear
    description: >-
      <p>Acquisition Specialists defeat security, assume false identities,
      and handle extraction logistics — whatever it takes to get the artifact
      out cleanly.</p>

# ── THE KEEP ────────────────────────────────
- _id: sub-k01
  name: Catalogers
  type: subdivision
  system:
    division: keep
    talentKey: catalogers
    keySkill: command
    baseCL: 3
    divisionItemName: "Warden's Bracer"
    specialties:
      - key: intake-officer
        label: Intake Officer
        description: >-
          First point of contact for newly recovered artifacts. Assesses risk
          level, initiates containment protocol, performs initial hazard
          classification, and opens the formal Registry entry.
      - key: archivist
        label: Archivist
        description: >-
          Maintains the Covenant's master artifact registry. Expert in
          historical context, cultural origin, and known hazard documentation.
          Coordinates with Wayfinder records to verify provenance.
      - key: containment-architect
        label: Containment Architect
        description: >-
          Designs and maintains the specialized vaults, sealed chambers, and
          environmental stabilization systems that keep artifacts secure.
          Conducts periodic inspections and redesigns containment when
          artifact behavior changes.
    startingGear:
      - name: Containment Kit
        type: gear
        pack: neon-relic.gear
      - name: Lore Reference Binder
        type: gear
        pack: neon-relic.gear
      - name: Formal Attire
        type: gear
        pack: neon-relic.gear
    description: >-
      <p>The Department of Catalogers handles artifact intake, maintains
      the master registry, and designs specialized containment vaults.</p>

- _id: sub-k02
  name: Wardens
  type: subdivision
  system:
    division: keep
    talentKey: wardens
    keySkill: command
    baseCL: 3
    divisionItemName: "Warden's Bracer"
    specialties:
      - key: vault-guardian
        label: Vault Guardian
        description: >-
          Stationed within Covenant facilities. Responsible for physical
          security of vaults and sensitive areas. First responders to
          containment failures, breaches, or unauthorized access events.
      - key: escort-warden
        label: Escort Warden
        description: >-
          Accompanies artifact transports and personnel through restricted or
          external environments. Provides mobile security during inter-facility
          transfers and high-clearance field movements.
      - key: field-warden
        label: Field Warden
        description: >-
          Deploys externally when hostile threats escalate beyond passive
          monitoring. Conducts disruption operations against rival factions
          and recovers property stolen from Covenant custody.
    startingGear:
      - name: Containment Kit
        type: gear
        pack: neon-relic.gear
      - name: Lore Reference Binder
        type: gear
        pack: neon-relic.gear
      - name: Formal Attire
        type: gear
        pack: neon-relic.gear
      - name: Revolver (.38)
        type: weapon
        pack: neon-relic.weapons-armor
    description: >-
      <p>Wardens provide physical security for vaults, escort artifact
      transports, and deploy externally when threats escalate.</p>

- _id: sub-k03
  name: Internal Counterintelligence
  type: subdivision
  system:
    division: keep
    talentKey: internal-ci
    keySkill: command
