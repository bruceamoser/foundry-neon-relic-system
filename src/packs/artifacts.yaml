# Artifacts Compendium Pack
# Neon Relic — Year Zero Engine
# 9 artifacts with full stats
---
- _id: art001
  name: The Crimson Lens
  type: artifact
  system:
    description: >
      A cracked monocle of deep red glass, rimmed in tarnished brass.
      When activated, reveals hidden occult traces and entity residue.
    containmentType: quiescence
    artifactDie: 8
    corruptionCost: 1
    emissionType: aura
    emissionDamage: 1
    emissionDamageType: horror
    triggerCondition: Looking through the lens at a person or scene.
    appetite: Secrets. Feeds on concealed truths.
    quiescence: Must be wrapped in black silk and stored in total darkness.
    activePressure: 1
    replicable: false

- _id: art002
  name: The Whispering Compass
  type: artifact
  system:
    description: >
      An antique brass compass whose needle spins toward sources of
      supernatural energy. It murmurs in an unknown language when active.
    containmentType: quiescence
    artifactDie: 10
    corruptionCost: 1
    emissionType: aura
    emissionDamage: 0
