          <h2>Kaltenberg — Town Square</h2>
          <p><strong>Location Type:</strong> Urban</p>
          <p>A quiet Bavarian town square with a fountain, a few shops, and a gasthaus. The locals are suspicious of outsiders.</p>
          <h3>Clues</h3>
          <ul>
            <li>The gasthaus owner saw people entering the old church at night.</li>
            <li>A local historian mentions the spear was in the town museum.</li>
          </ul>

