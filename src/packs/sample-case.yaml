          <h2>Kaltenberg — Old Church</h2>
          <p><strong>Location Type:</strong> Building</p>
          <p>A crumbling medieval church on the hill above town. The Congregation of the Veil has been using the crypt for their rituals. The air inside feels wrong.</p>
          <h3>Clues</h3>
          <ul>
            <li>Ritual markings on the crypt floor</li>
            <li>The spear's containment case is open and empty</li>
          </ul>
          <h3>Threats</h3>
          <ul>
            <li>Cult acolytes (2–3) guard the entrance at night</li>
            <li>Psychic residue causes −1 to EMP rolls inside</li>
          </ul>

