    - name: 'Case Brief'
      type: text
      text:
        content: |
          <h2>The Spear That Went Dark</h2>
          <p><strong>Threat Level:</strong> 3 &nbsp; <strong>Status:</strong> Active</p>
          <h3>Summary</h3>
          <p>A medieval spear believed to be a minor occult relic has gone
          dark — it stopped emitting detectable psychic signatures after
          decades of stable monitoring. The Verdant Covenant dispatched
          the agents to the small German town of Kaltenberg to investigate.
          What they find is far worse than a dormant artifact.</p>
          <h3>Objectives</h3>
          <ol>
            <li>Locate the spear's last known position</li>
            <li>Determine why emissions ceased</li>
            <li>Assess threat level and containment options</li>
            <li>Recover or contain the artifact</li>
          </ol>
          <h3>Relics</h3>
          <ul><li><strong>The Kaltenberg Spear</strong> — Missing</li></ul>
          <h3>Organizations</h3>
          <ul>
            <li><strong>The Congregation of the Veil</strong> (Countdown: 0/8) — Complete the Awakening Ritual.
            A cult operating out of the old church in Kaltenberg. They stole the spear to use in a ritual they believe will open a permanent gateway.
            Members: Sister Maren (Cult Leader), Brother Jens (Inner Circle), Elke Braun (Recruit).</li>
            <li><strong>Kessler Network</strong> (Countdown: 0/6) — Acquire the spear for a private buyer.
            Viktor Kessler has sent an operative to Kaltenberg to acquire the spear before anyone else can.
            Members: Viktor Kessler (Handler, remote), Rook (Field Operative).</li>
          </ul>
          <h3>Notes</h3>
          <p>The spear was last monitored by the Wayfinder Division's Remote Sensing Wing. Emissions flatlined on October 3, 1987. Local Covenant contacts in Kaltenberg have not responded to check-in requests for 72 hours.</p>

