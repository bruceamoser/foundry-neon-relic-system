      - range: [6, 6]
        result: 'Unstable — Unpredictable side effect'

- _id: rtbl005
  name: Scavenging Finds (d6)
  type: rollTable
  system:
    formula: 1d6
    entries:
      - range: [1, 1]
        result: 'Nothing useful'
      - range: [2, 2]
        result: 'Scrap junk (1 component)'
      - range: [3, 3]
        result: 'Repair parts (2 components)'
      - range: [4, 4]
        result: 'Basic supplies (rations, bandages)'
      - range: [5, 5]
        result: 'Usable gear (random common item)'
      - range: [6, 6]
        result: "Rare find (DA's choice)"

- _id: rtbl006
