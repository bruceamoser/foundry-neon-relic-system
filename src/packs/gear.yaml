# Gear & Consumables Compendium Pack
# Neon Relic — Year Zero Engine
---
# ── Division Items ───────────────────────────
- _id: div001
  name: Verdant Codex
  type: gear
  img: systems/neon-relic/assets/icons/gear-default.svg
  system:
    description: >-
      <p>Ancient leather-bound field journal issued to Wayfinder agents.
      Secures memory, assists with language and symbol work, highlights
      likely historical correlations, and preserves documents.</p>
      <p><strong>Mechanical Benefit:</strong> +1 bonus die on Lore or
      Investigate rolls using Codex notes. Automatically records successful
      Lore rolls so they cannot be forgotten.</p>
    gearBonus:
      value: 1
      max: 1
    encumbrance: 0
    cl: 1
    isBroken: false
    skillBonus: lore

- _id: div002
  name: Verdant Satchel
  type: gear
  img: systems/neon-relic/assets/icons/gear-default.svg
  system:
    description: >-
      <p>Reinforced satchel lined with containment materials, issued to
      Recovery agents. Masks minor artifact signatures, stabilizes transport,
      warns of instability, and keeps basic field tools ready.</p>
      <p><strong>Mechanical Benefit:</strong> Artifacts inside don't emit
      passive Corruption (Aura). Warns when artifact reaches
      Volatile/Catastrophic. Can stabilize an artifact for one round
      (1/scene).</p>
    gearBonus:
      value: 0
      max: 0
    encumbrance: 0
    cl: 1
    isBroken: false

- _id: div003
  name: "Warden's Bracer"
  type: gear
  img: systems/neon-relic/assets/icons/gear-default.svg
  system:
    description: >-
      <p>Reinforced bracer with embedded containment circuitry, issued to
      Keep agents. Dampens nearby emissions during handling, warns of
      containment failure, and makes cursed objects safer to manage.</p>
      <p><strong>Mechanical Benefit:</strong> +1 Armor Rating. Absorbs
      1 Corruption per session passively.</p>
    gearBonus:
      value: 0
      max: 0
    encumbrance: 0
    cl: 1
    isBroken: false

