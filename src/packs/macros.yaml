# Macros Compendium Pack
# Neon Relic — Pre-built game action macros
---
- _id: macro001
  name: Roll Attribute
  type: macro
  system:
    macroType: script
    description: Prompts for an attribute and rolls a dice pool.
    script: |
      const actor = canvas.tokens.controlled[0]?.actor ?? game.user.character;
      if (!actor) return ui.notifications.warn('Select a token or assign a character.');
      const attrs = Object.entries(CONFIG.NEON_RELIC.attributes);
      const content = attrs.map(([k,v]) => `<option value="${k}">${game.i18n.localize(v)}</option>`).join('');
      const html = await Dialog.prompt({
        title: 'Roll Attribute',
        content: `<form><div class="form-group"><label>Attribute</label><select name="attr">${content}</select></div></form>`,
        callback: (html) => html[0].querySelector('[name=attr]').value
      });
      if (html) actor.sheet._onRollAttribute?.({ currentTarget: { dataset: { attribute: html } } });

