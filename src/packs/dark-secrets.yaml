# Dark Secrets Compendium Pack
# Neon Relic — Year Zero Engine
# 20 dark secrets: 5 Wayfinder, 5 Recovery, 5 Keep, 5 Stack (Keep — Logistics)
---
# ── Wayfinder Dark Secrets ──────────────────

- _id: ds-w01
  name: The Fabricated Report
  type: darkSecret
  system:
    description: >-
      You submitted a field analysis that was false. You buried evidence linking
      a recovered artifact to a civilian casualty event. The truth is in a file
      somewhere. The file has a reference number. You know it.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Wayfinder
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-w02
  name: The Missing Informant
  type: darkSecret
  system:
    description: >-
      You cultivated a civilian informant for three years — a librarian with a
      genuine gift for pattern recognition. When the case closed, they
      disappeared. You did not report them missing. You don't know what happened,
      but you fear you do.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Wayfinder
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-w03
  name: Unauthorized Correspondence
  type: darkSecret
  system:
    description: >-
      You have been communicating with a researcher outside the Covenant —
      someone who reached out through channels that shouldn't exist. Their
      information has been accurate. You have told them more than authorized. You
      don't know who they work for.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Wayfinder
    exposurePenalties:
      standingLoss: 1
      factionConsequence: >-
        Faction gains leverage hold on agent — once per arc, DA may present
        agent with a task from the faction.

- _id: ds-w04
  name: The Siphoned Archive
  type: darkSecret
  system:
    description: >-
      You copied a restricted section of the Verdant Codex and hid the
      transcription in a dead drop you maintain. Your reason was professional —
      there were patterns in the restricted material that connected to an active
      case. Your superior has since died. Nobody else knows about the copy or the
      dead drop.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Wayfinder
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-w05
  name: The Wrong Conclusion
  type: darkSecret
  system:
    description: >-
      Your analysis on the Alderman Acquisition directly caused the team to
      misidentify and release a contained artifact. What they released hurt three
      people. The official record says the release was accidental. You know it
      followed your recommendation.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Wayfinder
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

# ── Recovery Dark Secrets ───────────────────

- _id: ds-r01
  name: The One You Left
  type: darkSecret
  system:
    description: >-
      You extracted a target from a hostile situation and got the artifact out
      clean. But you left someone behind who could have survived with ten more
      minutes. You made a judgment call. They did not make it out. They had a
      name. You remember it.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Recovery
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-r02
  name: The Side Deal
  type: darkSecret
  system:
    description: >-
      You negotiated a private arrangement with a civilian who held an artifact:
      they handed it over, you gave them something in return. Not money —
      something Covenant. A name. A suppressed report. A real asset. The
      Covenant doesn't know the trade terms.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Recovery
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-r03
  name: The Competing Employer
  type: darkSecret
  system:
    description: >-
      Early in your career — before the Covenant — you did contract work for a
      private intelligence firm. You never fully severed the relationship. They
      knew about you when you were recruited. You have not told anyone. At least
      one person at the firm knows you are Covenant now.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Recovery
    exposurePenalties:
      standingLoss: 1
      factionConsequence: >-
        Faction gains leverage hold on agent — once per arc, DA may present
        agent with a task from the faction.

- _id: ds-r04
  name: The Planted Evidence
  type: darkSecret
  system:
    description: >-
      On a recovery that was politically complicated, you placed evidence at a
      scene to close a civilian case that was getting too close to the truth. An
      innocent person was charged. The case was closed. You closed it
      deliberately.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Recovery
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-r05
  name: The Kept Artifact
  type: darkSecret
  system:
    description: >-
      You found a secondary artifact on a site — smaller, overlooked. You logged
      the primary. The secondary is in a fireproof box in your apartment. You
      tell yourself you're studying it. That has been true for sixteen months.
      You have not told anyone.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Recovery
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

# ── Keep Dark Secrets ───────────────────────

- _id: ds-k01
  name: The Unauthorized Transfer
  type: darkSecret
  system:
    description: >-
      You moved an artifact between vault cells without clearance — you believed
      its listed containment protocol was incorrect. You were probably right. But
      the transfer created a window during which something influenced three
      junior staff members. The behavioural anomalies are in the health records.
      You signed the transfer log as routine maintenance.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Keep
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-k02
  name: The Suppressed Incident
  type: darkSecret
  system:
    description: >-
      Fourteen months ago, containment in your section failed briefly. Nothing
      escaped. But a visitor was present — a civilian consultant who should never
      have been in that corridor. They survived. You suppressed the incident log
      entry. The consultant now returns your calls with a very specific kind of
      urgency.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Keep
    exposurePenalties:
      standingLoss: 1
      factionConsequence: >-
        Faction gains leverage hold on agent — once per arc, DA may present
        agent with a task from the faction.

- _id: ds-k03
  name: The Loyalty Debt
  type: darkSecret
  system:
    description: >-
      You owe a significant personal debt to someone who is a member of The
      Vantablack Compact. The debt predates your Covenant service. You have not
      acted on it, but you have also not reported the contact. The debt is the
      kind that has a due date.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Keep
    exposurePenalties:
      standingLoss: 1
      factionConsequence: >-
        Faction gains leverage hold on agent — once per arc, DA may present
        agent with a task from the faction.

- _id: ds-k04
  name: The Copyist
  type: darkSecret
  system:
    description: >-
      You maintain a personal archive — transcribed containment protocols,
      artifact property notes, Warden's Bracer readings — for a project you tell
      yourself is academic. The project is not approved. The archive exists on
      paper, in your handwriting, in your home. You know what happens if it's
      found.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Keep
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-k05
  name: The Broken Warden
  type: darkSecret
  system:
    description: >-
      A trainee under your supervision suffered a containment exposure event
      eighteen months ago. The official report says they resigned for personal
      reasons. They are alive, institutionalized under a false name you arranged,
      and the Covenant does not know they exist. You visit them every few weeks.
      They are getting worse.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Keep
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

# ── Stack Dark Secrets (Keep — Logistics) ───

- _id: ds-s01
  name: The Off-Books Supply Chain
  type: darkSecret
  system:
    description: >-
      You have a procurement network that the Covenant doesn't know about. It
      operates faster and quieter than official channels. You trust it because
      you built it. Two of your suppliers have connections you would struggle to
      explain cleanly.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Stack (Keep)
    exposurePenalties:
      standingLoss: 1
      factionConsequence: >-
        Faction gains leverage hold on agent — once per arc, DA may present
        agent with a task from the faction.

- _id: ds-s02
  name: The Substitution
  type: darkSecret
  system:
    description: >-
      When a mission-critical component was unavailable, you substituted
      something that looked right, worked in the moment, and was not what you
      logged it as. Nothing went wrong. But the mission notes, the equipment
      manifest, and the Covenant's records all describe gear that was not
      actually used.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Stack (Keep)
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-s03
  name: The Blackmail File
  type: darkSecret
  system:
    description: >-
      You stumbled onto something about a senior Covenant official during a
      logistics audit. You photographed the document. You have not used it, have
      not shown it to anyone, have no plan to. But you kept the photograph. It
      is in a very safe place.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Stack (Keep)
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''

- _id: ds-s04
  name: The Freelance Job
  type: darkSecret
  system:
    description: >-
      Before — or possibly overlapping with — your Covenant service, you
      completed contract work for private clients that was unambiguously not
      sanctioned. The work involved resources and knowledge that came from your
      Covenant position. You were careful. You do not think you were seen.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Stack (Keep)
    exposurePenalties:
      standingLoss: 1
      factionConsequence: >-
        Faction gains leverage hold on agent — once per arc, DA may present
        agent with a task from the faction.

- _id: ds-s05
  name: The Faulty Log
  type: darkSecret
  system:
    description: >-
      The inventory manifest for the last six months has an inconsistency — a
      recurring item that is always logged as consumed but which you know was not
      always needed. Someone above you in the logistics chain is running a
      parallel set of numbers. You have not reported it because you're not
      certain you are not also implicated.
    xpTrigger: Did your Dark Secret complicate the mission?
    divisionExamples: Stack (Keep)
    exposurePenalties:
      standingLoss: 1
      factionConsequence: ''
