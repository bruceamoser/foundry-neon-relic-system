- _id: tal-g01
  name: Tough
  type: talent
  system:
    talentType: general
    description: You can take more punishment than most. +2 to Corruption threshold.
    thresholdMod: 2

- _id: tal-g02
  name: Quick Reflexes
  type: talent
  system:
    talentType: general
    description: Draw 2 initiative cards and choose the best one.
    effect: Draw 2, keep best.

- _id: tal-g03
